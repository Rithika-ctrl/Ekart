<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Report — Ekart</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="/css/ekart-glass.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <a class="navbar-brand" href="/vendor/home"><i class="fas fa-store mr-2"></i>Ekart Vendor</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#nav"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item"><a class="nav-link" href="/manage-products"><i class="fas fa-tasks mr-1"></i>Products</a></li>
                <li class="nav-item"><a class="nav-link" href="/vendor/store-front"><i class="fas fa-store mr-1"></i>Store</a></li>
                <li class="nav-item"><a class="nav-link" href="/logout"><i class="fas fa-sign-out-alt mr-1"></i>Logout</a></li>
            </ul>
        </div>
    </nav>
    <div class="container">
        <div class="alert alert-success alert-dismissible fade show" th:if="${session.success}">
            <i class="fas fa-check-circle"></i><span th:text="${session.success}"></span>
            <button type="button" class="close" data-dismiss="alert"><span>&times;</span></button>
        </div>
        <div class="alert alert-danger alert-dismissible fade show" th:if="${session.failure}">
            <i class="fas fa-exclamation-circle"></i><span th:text="${session.failure}"></span>
            <button type="button" class="close" data-dismiss="alert"><span>&times;</span></button>
        </div>
        <th:block th:text="${@messageRemover.remove()}"></th:block>

        <h2 class="mb-1"><i class="fas fa-chart-line mr-2" style="color:var(--teal-lt);"></i>Sales Report</h2>
        <p class="mb-4" style="color:var(--t2);font-size:0.9rem;">Your revenue analytics and sales overview.</p>

        <div class="row mb-4">
            <div class="col-md-4 mb-3">
                <div class="content-section animate-in text-center" style="padding:1.5rem;">
                    <div style="font-size:0.75rem;color:var(--t3);text-transform:uppercase;letter-spacing:0.06em;font-weight:600;margin-bottom:0.5rem;">Total Revenue</div>
                    <div style="font-family:'Clash Display',sans-serif;font-size:2rem;font-weight:700;background:linear-gradient(135deg,#a78bfa,#fb7185);-webkit-background-clip:text;-webkit-text-fill-color:transparent;" th:text="'₹'+${totalRevenue}">₹0</div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="content-section animate-in text-center" style="padding:1.5rem;">
                    <div style="font-size:0.75rem;color:var(--t3);text-transform:uppercase;letter-spacing:0.06em;font-weight:600;margin-bottom:0.5rem;">Total Orders</div>
                    <div style="font-family:'Clash Display',sans-serif;font-size:2rem;font-weight:700;color:var(--teal-lt);" th:text="${totalOrders}">0</div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="content-section animate-in text-center" style="padding:1.5rem;">
                    <div style="font-size:0.75rem;color:var(--t3);text-transform:uppercase;letter-spacing:0.06em;font-weight:600;margin-bottom:0.5rem;">Products Listed</div>
                    <div style="font-family:'Clash Display',sans-serif;font-size:2rem;font-weight:700;color:var(--amber-lt);" th:text="${totalProducts}">0</div>
                </div>
            </div>
        </div>

        <div class="card animate-in" style="padding:0;overflow:hidden;">
            <div class="table-responsive">
                <table class="table">
                    <thead><tr><th>#</th><th>Product</th><th>Orders</th><th>Revenue</th><th>Status</th></tr></thead>
                    <tbody>
                        <tr th:each="item,iter:${salesData}">
                            <td style="color:var(--t3);" th:text="${iter.index+1}"></td>
                            <td>
                                <div style="display:flex;align-items:center;gap:0.75rem;">
                                    <img th:src="${item.product.imageLink}" style="width:40px;height:40px;object-fit:cover;border-radius:8px;">
                                    <span style="font-weight:600;" th:text="${item.product.name}"></span>
                                </div>
                            </td>
                            <td style="color:var(--teal-lt);font-weight:600;" th:text="${item.orderCount}"></td>
                            <td style="color:var(--violet-lt);font-weight:700;">₹<span th:text="${item.revenue}"></span></td>
                            <td><span class="badge badge-success" th:if="${item.product.approved}">Live</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="content-section mt-4" style="padding:1.5rem;" th:if="${chartData != null}">
            <div style="font-family:'Clash Display',sans-serif;font-weight:600;margin-bottom:1rem;">Revenue Over Time</div>
            <canvas id="salesChart" style="max-height:300px;"></canvas>
        </div>
    </div>
    <footer class="text-center mt-auto"><div class="p-3">© 2026 Ekart. All rights reserved. | <i class="fas fa-heart text-danger"></i> Made with passion</div></footer>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script th:if="${chartData != null}">
    var ctx = document.getElementById('salesChart').getContext('2d');
    new Chart(ctx, {
        type: 'line',
        data: JSON.parse('[[${chartData}]]'),
        options: {
            responsive: true,
            plugins: { legend: { labels: { color: '#94a3b8' } } },
            scales: {
                x: { ticks: { color: '#4b5563' }, grid: { color: 'rgba(255,255,255,0.05)' } },
                y: { ticks: { color: '#4b5563' }, grid: { color: 'rgba(255,255,255,0.05)' } }
            }
        }
    });
    </script>
</body>
</html>
