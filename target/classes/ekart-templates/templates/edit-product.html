<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Product — Ekart</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="/css/ekart-glass.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <a class="navbar-brand" href="/vendor/home"><i class="fas fa-store mr-2"></i>Ekart Vendor</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#nav"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item"><a class="nav-link" href="/add-product"><i class="fas fa-plus mr-1"></i>Add Product</a></li>
                <li class="nav-item"><a class="nav-link" href="/manage-products"><i class="fas fa-tasks mr-1"></i>Products</a></li>
                <li class="nav-item"><a class="nav-link" href="/vendor/sales-report"><i class="fas fa-chart-line mr-1"></i>Sales</a></li>
                <li class="nav-item"><a class="nav-link" href="/stock-alerts"><i class="fas fa-bell mr-1"></i>Alerts</a></li>
                <li class="nav-item"><a class="nav-link" href="/logout"><i class="fas fa-sign-out-alt mr-1"></i>Logout</a></li>
            </ul>
        </div>
    </nav>
    <div class="container">
        <div class="alert alert-success alert-dismissible fade show" th:if="${session.success}">
            <i class="fas fa-check-circle"></i><span th:text="${session.success}"></span>
            <button type="button" class="close" data-dismiss="alert"><span>&times;</span></button>
        </div>
        <div class="alert alert-danger alert-dismissible fade show" th:if="${session.failure}">
            <i class="fas fa-exclamation-circle"></i><span th:text="${session.failure}"></span>
            <button type="button" class="close" data-dismiss="alert"><span>&times;</span></button>
        </div>
        <th:block th:text="${@messageRemover.remove()}"></th:block>
        <div class="form-container animate-in" style="max-width:640px;">
            <div class="text-center mb-4">
                <div class="page-icon-wrap amber"><i class="fas fa-edit"></i></div>
                <h2>Edit Product</h2>
                <p style="color:var(--t2);font-size:0.9rem;">Update your product information.</p>
            </div>
            <form action="/edit-product" method="post" enctype="multipart/form-data" th:object="${product}">
                <input type="hidden" th:field="*{id}">
                <div class="form-group">
                    <label><i class="fas fa-tag mr-1"></i> Product Name</label>
                    <input type="text" class="form-control" th:field="*{name}" name="name" required>
                    <small class="text-danger" th:errors="*{name}"></small>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-align-left mr-1"></i> Description</label>
                    <textarea class="form-control" th:field="*{description}" name="description" rows="3"></textarea>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label><i class="fas fa-rupee-sign mr-1"></i> Price (₹)</label>
                            <input type="number" class="form-control" th:field="*{price}" name="price" step="0.01" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label><i class="fas fa-cubes mr-1"></i> Stock</label>
                            <input type="number" class="form-control" th:field="*{stock}" name="stock" required>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-th-large mr-1"></i> Category</label>
                    <select class="form-control" th:field="*{category}" name="category">
                        <option>Electronics</option><option>Clothing</option><option>Books</option>
                        <option>Home &amp; Living</option><option>Sports</option><option>Beauty</option>
                        <option>Toys</option><option>Grocery</option><option>Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Current Image</label>
                    <div style="margin-bottom:0.75rem;">
                        <img th:src="${product.imageLink}" style="height:80px;width:80px;object-fit:cover;border-radius:10px;border:1px solid rgba(255,255,255,0.1);">
                    </div>
                    <label><i class="fas fa-image mr-1"></i> Replace Image</label>
                    <input type="file" class="form-control" name="image" accept="image/*">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-images mr-1"></i> Additional Images</label>
                    <input type="file" class="form-control" name="extraImages" accept="image/*" multiple>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-video mr-1"></i> Replace Video</label>
                    <input type="file" class="form-control" name="video" accept="video/*">
                </div>
                <button type="submit" class="btn btn-warning btn-block btn-lg mt-2">
                    <i class="fas fa-save mr-2"></i>Save Changes
                </button>
            </form>
        </div>
    </div>
    <footer class="text-center mt-auto">
        <div class="p-3">© 2026 Ekart. All rights reserved. &nbsp;|&nbsp; <i class="fas fa-heart text-danger"></i> Made with passion</div>
    </footer>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script>
        setTimeout(function(){ $(".alert").fadeTo(400,0).slideUp(400,function(){ $(this).remove(); }); }, 3500);
    </script>
</body>
</html>
