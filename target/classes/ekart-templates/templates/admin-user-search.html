<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Search — Admin — Ekart</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="/css/ekart-glass.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <a class="navbar-brand" href="/admin/home"><i class="fas fa-shield-alt mr-2"></i>Ekart Admin</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#nav"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item"><a class="nav-link" href="/admin/view-products"><i class="fas fa-boxes mr-1"></i>Products</a></li>
                <li class="nav-item"><a class="nav-link" href="/admin/view-users"><i class="fas fa-users mr-1"></i>Users</a></li>
                <li class="nav-item"><a class="nav-link" href="/logout"><i class="fas fa-sign-out-alt mr-1"></i>Logout</a></li>
            </ul>
        </div>
    </nav>
    <div class="container">
        <div class="alert alert-success alert-dismissible fade show" th:if="${session.success}">
            <i class="fas fa-check-circle"></i><span th:text="${session.success}"></span>
            <button type="button" class="close" data-dismiss="alert"><span>&times;</span></button>
        </div>
        <div class="alert alert-danger alert-dismissible fade show" th:if="${session.failure}">
            <i class="fas fa-exclamation-circle"></i><span th:text="${session.failure}"></span>
            <button type="button" class="close" data-dismiss="alert"><span>&times;</span></button>
        </div>
        <th:block th:text="${@messageRemover.remove()}"></th:block>
        <h2 class="mb-4"><i class="fas fa-user-search mr-2" style="color:var(--sapphire-lt);"></i>User Search</h2>
        <div class="content-section animate-in mb-4" style="padding:1.5rem;">
            <form action="/admin/user-search" method="get" class="d-flex" style="gap:1rem;">
                <input type="text" name="query" class="form-control" placeholder="Search by name, email or phone..." style="flex:1;">
                <button type="submit" class="btn btn-primary"><i class="fas fa-search mr-2"></i>Search</button>
            </form>
        </div>
        <div class="card" style="padding:0;overflow:hidden;" th:if="${users != null and !#lists.isEmpty(users)}">
            <div class="table-responsive">
                <table class="table">
                    <thead><tr><th>#</th><th>Name</th><th>Email</th><th>Mobile</th><th>Role</th></tr></thead>
                    <tbody>
                        <tr th:each="u,i:${users}">
                            <td style="color:var(--t3);" th:text="${i.index+1}"></td>
                            <td style="font-weight:600;" th:text="${u.name}"></td>
                            <td style="color:var(--t2);" th:text="${u.email}"></td>
                            <td style="color:var(--t2);" th:text="${u.mobile}"></td>
                            <td><span class="badge badge-info" th:text="${u.role}"></span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <footer class="text-center mt-auto">
        <div class="p-3">© 2026 Ekart. All rights reserved. &nbsp;|&nbsp; <i class="fas fa-heart text-danger"></i> Made with passion</div>
    </footer>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script>
        setTimeout(function(){ $(".alert").fadeTo(400,0).slideUp(400,function(){ $(this).remove(); }); }, 3500);
    </script>
</body>
</html>
