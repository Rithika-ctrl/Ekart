<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product — Ekart</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="/css/ekart-glass.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <a class="navbar-brand" href="/vendor/home"><i class="fas fa-store mr-2"></i>Ekart Vendor</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#nav"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item"><a class="nav-link" href="/add-product"><i class="fas fa-plus mr-1"></i>Add Product</a></li>
                <li class="nav-item"><a class="nav-link" href="/manage-products"><i class="fas fa-tasks mr-1"></i>Products</a></li>
                <li class="nav-item"><a class="nav-link" href="/vendor/sales-report"><i class="fas fa-chart-line mr-1"></i>Sales</a></li>
                <li class="nav-item"><a class="nav-link" href="/stock-alerts"><i class="fas fa-bell mr-1"></i>Alerts</a></li>
                <li class="nav-item"><a class="nav-link" href="/logout"><i class="fas fa-sign-out-alt mr-1"></i>Logout</a></li>
            </ul>
        </div>
    </nav>
    <div class="container">
        <div class="alert alert-success alert-dismissible fade show" th:if="${session.success}">
            <i class="fas fa-check-circle"></i><span th:text="${session.success}"></span>
            <button type="button" class="close" data-dismiss="alert"><span>&times;</span></button>
        </div>
        <div class="alert alert-danger alert-dismissible fade show" th:if="${session.failure}">
            <i class="fas fa-exclamation-circle"></i><span th:text="${session.failure}"></span>
            <button type="button" class="close" data-dismiss="alert"><span>&times;</span></button>
        </div>
        <th:block th:text="${@messageRemover.remove()}"></th:block>
        <div class="form-container animate-in" style="max-width:640px;">
            <div class="text-center mb-4">
                <div class="page-icon-wrap rose"><i class="fas fa-plus-circle"></i></div>
                <h2>Add New Product</h2>
                <p style="color:var(--t2);font-size:0.9rem;">List a new item on the marketplace.</p>
            </div>
            <form action="/add-product" method="post" enctype="multipart/form-data" th:object="${product}">
                <div class="form-group">
                    <label><i class="fas fa-tag mr-1"></i> Product Name</label>
                    <input type="text" class="form-control" th:field="*{name}" name="name" placeholder="Enter product name" required>
                    <small class="text-danger" th:errors="*{name}"></small>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-align-left mr-1"></i> Description</label>
                    <textarea class="form-control" th:field="*{description}" name="description" rows="3" placeholder="Describe your product..."></textarea>
                    <small class="text-danger" th:errors="*{description}"></small>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label><i class="fas fa-rupee-sign mr-1"></i> Price (₹)</label>
                            <input type="number" class="form-control" th:field="*{price}" name="price" placeholder="0.00" step="0.01" required>
                            <small class="text-danger" th:errors="*{price}"></small>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label><i class="fas fa-cubes mr-1"></i> Stock Quantity</label>
                            <input type="number" class="form-control" th:field="*{stock}" name="stock" placeholder="0" required>
                            <small class="text-danger" th:errors="*{stock}"></small>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-th-large mr-1"></i> Category</label>
                    <select class="form-control" th:field="*{category}" name="category" required>
                        <option value="">Choose a category</option>
                        <option>Electronics</option><option>Clothing</option><option>Books</option>
                        <option>Home &amp; Living</option><option>Sports</option><option>Beauty</option>
                        <option>Toys</option><option>Grocery</option><option>Other</option>
                    </select>
                    <small class="text-danger" th:errors="*{category}"></small>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-image mr-1"></i> Main Product Image</label>
                    <input type="file" class="form-control" name="image" accept="image/*">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-images mr-1"></i> Additional Images <small style="color:var(--t3);font-size:0.75rem;">(optional, select multiple)</small></label>
                    <input type="file" class="form-control" name="extraImages" accept="image/*" multiple>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-video mr-1"></i> Product Video <small style="color:var(--t3);font-size:0.75rem;">(optional)</small></label>
                    <input type="file" class="form-control" name="video" accept="video/*">
                </div>
                <button type="submit" class="btn btn-primary btn-block btn-lg mt-2">
                    <i class="fas fa-plus-circle mr-2"></i>Add Product
                </button>
            </form>
        </div>
    </div>
    <footer class="text-center mt-auto">
        <div class="p-3">© 2026 Ekart. All rights reserved. &nbsp;|&nbsp; <i class="fas fa-heart text-danger"></i> Made with passion</div>
    </footer>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script>
        setTimeout(function(){ $(".alert").fadeTo(400,0).slideUp(400,function(){ $(this).remove(); }); }, 3500);
    </script>
</body>
</html>
