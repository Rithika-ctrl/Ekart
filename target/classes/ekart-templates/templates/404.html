<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — Ekart</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="/css/ekart-glass.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg"><a class="navbar-brand" href="/"><i class="fas fa-shopping-bag mr-2"></i>Ekart</a></nav>
    <div class="container" style="display:flex;align-items:center;justify-content:center;min-height:70vh;">
        <div class="text-center animate-in">
            <div style="font-family:'Clash Display',sans-serif;font-size:clamp(5rem,20vw,10rem);font-weight:700;line-height:1;background:linear-gradient(135deg,#7c3aed,#e11d48,#d97706);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:1.5rem;">404</div>
            <h2 style="margin-bottom:0.75rem;">Page Not Found</h2>
            <p style="color:var(--t2);margin-bottom:2rem;">The page you're looking for doesn't exist or has been moved.</p>
            <a href="/" class="btn btn-primary btn-lg"><i class="fas fa-home mr-2"></i>Back to Home</a>
        </div>
    </div>
    <footer class="text-center mt-auto">
        <div class="p-3">© 2026 Ekart. All rights reserved. &nbsp;|&nbsp; <i class="fas fa-heart text-danger"></i> Made with passion</div>
    </footer>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script>
        setTimeout(function(){ $(".alert").fadeTo(400,0).slideUp(400,function(){ $(this).remove(); }); }, 3500);
    </script>
</body>
</html>
