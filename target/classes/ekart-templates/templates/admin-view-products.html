<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Products — Admin — Ekart</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="/css/ekart-glass.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <a class="navbar-brand" href="/admin/home"><i class="fas fa-shield-alt mr-2"></i>Ekart Admin</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#nav"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item"><a class="nav-link" href="/admin/view-products"><i class="fas fa-boxes mr-1"></i>Products</a></li>
                <li class="nav-item"><a class="nav-link" href="/admin/view-users"><i class="fas fa-users mr-1"></i>Users</a></li>
                <li class="nav-item"><a class="nav-link" href="/logout"><i class="fas fa-sign-out-alt mr-1"></i>Logout</a></li>
            </ul>
        </div>
    </nav>
    <div class="container">
        <div class="alert alert-success alert-dismissible fade show" th:if="${session.success}">
            <i class="fas fa-check-circle"></i><span th:text="${session.success}"></span>
            <button type="button" class="close" data-dismiss="alert"><span>&times;</span></button>
        </div>
        <div class="alert alert-danger alert-dismissible fade show" th:if="${session.failure}">
            <i class="fas fa-exclamation-circle"></i><span th:text="${session.failure}"></span>
            <button type="button" class="close" data-dismiss="alert"><span>&times;</span></button>
        </div>
        <th:block th:text="${@messageRemover.remove()}"></th:block>
        <h2 class="mb-4"><i class="fas fa-boxes mr-2" style="color:var(--teal-lt);"></i>All Products</h2>
        <div class="card animate-in" style="padding:0;overflow:hidden;">
            <div class="table-responsive">
                <table class="table">
                    <thead><tr><th>Image</th><th>Product</th><th>Vendor</th><th>Price</th><th>Stock</th><th>Status</th><th>Actions</th></tr></thead>
                    <tbody>
                        <tr th:each="p:${products}">
                            <td><img th:src="${p.imageLink}" style="width:48px;height:48px;object-fit:cover;border-radius:8px;"></td>
                            <td>
                                <div style="font-weight:600;" th:text="${p.name}"></div>
                                <div style="font-size:0.78rem;color:var(--t3);" th:text="${p.category}"></div>
                            </td>
                            <td style="color:var(--t2);font-size:0.85rem;" th:text="${p.vendor.name}"></td>
                            <td style="color:var(--violet-lt);font-weight:700;">₹<span th:text="${p.price}"></span></td>
                            <td th:text="${p.stock}"></td>
                            <td>
                                <span class="badge badge-success" th:if="${p.approved}">Approved</span>
                                <span class="badge badge-warning" th:unless="${p.approved}">Pending</span>
                            </td>
                            <td>
                                <a th:if="${!p.approved}" th:href="'/admin/approve-product/'+${p.id}" class="btn btn-success btn-sm mr-1">Approve</a>
                                <a th:href="'/admin/delete-product/'+${p.id}" class="btn btn-danger btn-sm" onclick="return confirm('Delete?')"><i class="fas fa-trash"></i></a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <footer class="text-center mt-auto">
        <div class="p-3">© 2026 Ekart. All rights reserved. &nbsp;|&nbsp; <i class="fas fa-heart text-danger"></i> Made with passion</div>
    </footer>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script>
        setTimeout(function(){ $(".alert").fadeTo(400,0).slideUp(400,function(){ $(this).remove(); }); }, 3500);
    </script>
</body>
</html>
