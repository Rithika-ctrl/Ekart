<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error — Ekart</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="/css/ekart-glass.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg"><a class="navbar-brand" href="/"><i class="fas fa-shopping-bag mr-2"></i>Ekart</a></nav>
    <div class="container" style="display:flex;align-items:center;justify-content:center;min-height:70vh;">
        <div class="form-container animate-in text-center">
            <div style="width:80px;height:80px;background:rgba(217,119,6,0.15);border:1px solid rgba(217,119,6,0.35);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;font-size:2rem;">
                <i class="fas fa-exclamation-triangle" style="color:var(--amber-lt);"></i>
            </div>
            <h2>Something Went Wrong</h2>
            <div class="alert alert-danger mt-3" th:if="${errorMessage}"><span th:text="${errorMessage}"></span></div>
            <p style="color:var(--t2);margin:1rem 0 2rem;">We're sorry for the inconvenience. Please try again.</p>
            <a href="/" class="btn btn-primary"><i class="fas fa-home mr-2"></i>Go Home</a>
        </div>
    </div>
    <footer class="text-center mt-auto">
        <div class="p-3">© 2026 Ekart. All rights reserved. &nbsp;|&nbsp; <i class="fas fa-heart text-danger"></i> Made with passion</div>
    </footer>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script>
        setTimeout(function(){ $(".alert").fadeTo(400,0).slideUp(400,function(){ $(this).remove(); }); }, 3500);
    </script>
</body>
</html>
