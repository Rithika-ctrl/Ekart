<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Login — Ekart</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="/css/ekart-glass.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <a class="navbar-brand" href="/"><i class="fas fa-shopping-bag mr-2"></i>Ekart</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#nav"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" data-toggle="dropdown"><i class="fas fa-user-circle mr-1"></i> Account</a>
                    <div class="dropdown-menu dropdown-menu-right">
                        <a class="dropdown-item" href="/customer/login"><i class="fas fa-user mr-2"></i>Customer Login</a>
                        <a class="dropdown-item" href="/customer/register"><i class="fas fa-user-plus mr-2"></i>Customer Register</a>
                        <div class="dropdown-divider" style="border-color:rgba(255,255,255,0.08)"></div>
                        <a class="dropdown-item" href="/vendor/login"><i class="fas fa-store mr-2"></i>Vendor Login</a>
                        <a class="dropdown-item" href="/vendor/register"><i class="fas fa-store mr-2"></i>Vendor Register</a>
                        <div class="dropdown-divider" style="border-color:rgba(255,255,255,0.08)"></div>
                        <a class="dropdown-item" href="/admin/login"><i class="fas fa-shield-alt mr-2"></i>Admin Login</a>
                    </div>
                </li>
            </ul>
        </div>
    </nav>
    <div class="container">
        <div class="alert alert-success alert-dismissible fade show" th:if="${session.success}">
            <i class="fas fa-check-circle"></i><span th:text="${session.success}"></span>
            <button type="button" class="close" data-dismiss="alert"><span>&times;</span></button>
        </div>
        <div class="alert alert-danger alert-dismissible fade show" th:if="${session.failure}">
            <i class="fas fa-exclamation-circle"></i><span th:text="${session.failure}"></span>
            <button type="button" class="close" data-dismiss="alert"><span>&times;</span></button>
        </div>
        <th:block th:text="${@messageRemover.remove()}"></th:block>
        <div class="form-container animate-in">
            <div class="text-center mb-4">
                <div class="page-icon-wrap rose"><i class="fas fa-store"></i></div>
                <h2>Vendor Login</h2>
                <p style="color:var(--t2);font-size:0.9rem;margin-top:0.4rem;">Sign in to manage your storefront and products.</p>
            </div>
            <form action="/vendor/login" method="post">
                <div class="form-group">
                    <label><i class="fas fa-envelope mr-1"></i> Email Address</label>
                    <input type="email" class="form-control" name="email" placeholder="vendor@example.com" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock mr-1"></i> Password</label>
                    <input type="password" class="form-control" name="password" placeholder="Your password" required>
                </div>
                <div class="text-right mb-4">
                    <a href="/vendor/forgot-password" style="font-size:0.82rem;">Forgot password?</a>
                </div>
                <button type="submit" class="btn btn-danger btn-block btn-lg">
                    <i class="fas fa-store mr-2"></i>Sign In as Vendor
                </button>
            </form>
            <p class="text-center mt-4" style="font-size:0.85rem;color:var(--t2);">New vendor? <a href="/vendor/register">Register your store</a></p>
        </div>
    </div>
    <footer class="text-center mt-auto">
        <div class="p-3">© 2026 Ekart. All rights reserved. &nbsp;|&nbsp; <i class="fas fa-heart text-danger"></i> Made with passion</div>
    </footer>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script>
        setTimeout(function(){ $(".alert").fadeTo(400,0).slideUp(400,function(){ $(this).remove(); }); }, 3500);
    </script>
</body>
</html>
