<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Front — Ekart</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="/css/ekart-glass.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <a class="navbar-brand" href="/vendor/home"><i class="fas fa-store mr-2"></i>Ekart Vendor</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#nav"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item"><a class="nav-link" href="/add-product"><i class="fas fa-plus mr-1"></i>Add Product</a></li>
                <li class="nav-item"><a class="nav-link" href="/manage-products"><i class="fas fa-tasks mr-1"></i>Products</a></li>
                <li class="nav-item"><a class="nav-link" href="/logout"><i class="fas fa-sign-out-alt mr-1"></i>Logout</a></li>
            </ul>
        </div>
    </nav>
    <div class="container">
        <div class="alert alert-success alert-dismissible fade show" th:if="${session.success}">
            <i class="fas fa-check-circle"></i><span th:text="${session.success}"></span>
            <button type="button" class="close" data-dismiss="alert"><span>&times;</span></button>
        </div>
        <div class="alert alert-danger alert-dismissible fade show" th:if="${session.failure}">
            <i class="fas fa-exclamation-circle"></i><span th:text="${session.failure}"></span>
            <button type="button" class="close" data-dismiss="alert"><span>&times;</span></button>
        </div>
        <th:block th:text="${@messageRemover.remove()}"></th:block>

        <div class="content-section animate-in mb-4" style="padding:2rem;background:linear-gradient(135deg,rgba(225,29,72,0.10),rgba(124,58,237,0.08)) !important;border-color:rgba(225,29,72,0.22) !important;">
            <div class="d-flex align-items-center" style="gap:1.5rem;flex-wrap:wrap;">
                <div style="width:72px;height:72px;background:rgba(225,29,72,0.15);border:2px solid rgba(225,29,72,0.3);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:1.75rem;flex-shrink:0;">
                    <i class="fas fa-store" style="color:var(--rose-lt);"></i>
                </div>
                <div>
                    <h2 style="margin-bottom:0.2rem;" th:text="${vendor.name}">Store Name</h2>
                    <p style="color:var(--t2);font-size:0.88rem;margin:0;" th:text="${vendor.email}">vendor@email.com</p>
                </div>
            </div>
        </div>

        <h3 class="mb-3"><i class="fas fa-box mr-2" style="color:var(--rose-lt);"></i>Your Products</h3>
        <div class="row">
            <div class="col-md-4 mb-4 animate-in" th:each="p:${products}">
                <div class="card" style="padding:0;overflow:hidden;">
                    <div style="position:relative;">
                        <img class="card-image" th:src="${p.imageLink}" style="border-radius:0;margin:0;">
                        <div style="position:absolute;bottom:10px;right:10px;background:rgba(5,7,15,0.85);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:4px 12px;">
                            <span style="font-family:'Clash Display',sans-serif;font-weight:700;font-size:0.95rem;color:var(--violet-lt);">₹<span th:text="${p.price}"></span></span>
                        </div>
                    </div>
                    <div style="padding:1rem;">
                        <h4 style="font-size:1rem;margin-bottom:0.25rem;" th:text="${p.name}"></h4>
                        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:0.5rem;">
                            <span class="badge badge-info" th:text="${p.category}"></span>
                            <span class="badge badge-success" th:if="${p.approved}">Live</span>
                            <span class="badge badge-warning" th:unless="${p.approved}">Pending</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div th:if="${products == null or #lists.isEmpty(products)}" class="text-center py-5">
            <div style="font-size:3.5rem;opacity:0.3;margin-bottom:1rem;">🏪</div>
            <h4 style="color:var(--t2);">No products yet</h4>
            <a href="/add-product" class="btn btn-primary mt-3"><i class="fas fa-plus mr-2"></i>Add First Product</a>
        </div>
    </div>
    <footer class="text-center mt-auto"><div class="p-3">© 2026 Ekart. All rights reserved. | <i class="fas fa-heart text-danger"></i> Made with passion</div></footer>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
