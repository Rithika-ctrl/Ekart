<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Products — Ekart</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="/css/ekart-glass.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <a class="navbar-brand" href="/vendor/home"><i class="fas fa-store mr-2"></i>Ekart Vendor</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#nav"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item"><a class="nav-link" href="/add-product"><i class="fas fa-plus mr-1"></i>Add Product</a></li>
                <li class="nav-item"><a class="nav-link" href="/manage-products"><i class="fas fa-tasks mr-1"></i>Products</a></li>
                <li class="nav-item"><a class="nav-link" href="/vendor/sales-report"><i class="fas fa-chart-line mr-1"></i>Sales</a></li>
                <li class="nav-item"><a class="nav-link" href="/stock-alerts"><i class="fas fa-bell mr-1"></i>Alerts</a></li>
                <li class="nav-item"><a class="nav-link" href="/logout"><i class="fas fa-sign-out-alt mr-1"></i>Logout</a></li>
            </ul>
        </div>
    </nav>
    <div class="container">
        <div class="alert alert-success alert-dismissible fade show" th:if="${session.success}">
            <i class="fas fa-check-circle"></i><span th:text="${session.success}"></span>
            <button type="button" class="close" data-dismiss="alert"><span>&times;</span></button>
        </div>
        <div class="alert alert-danger alert-dismissible fade show" th:if="${session.failure}">
            <i class="fas fa-exclamation-circle"></i><span th:text="${session.failure}"></span>
            <button type="button" class="close" data-dismiss="alert"><span>&times;</span></button>
        </div>
        <th:block th:text="${@messageRemover.remove()}"></th:block>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fas fa-tasks mr-2" style="color:var(--rose-lt);"></i>Manage Products</h2>
            <a href="/add-product" class="btn btn-primary"><i class="fas fa-plus mr-2"></i>Add New</a>
        </div>
        <div class="card animate-in" style="padding:0;overflow:hidden;">
            <div class="table-responsive">
                <table class="table">
                    <thead><tr><th>Image</th><th>Name</th><th>Price</th><th>Stock</th><th>Status</th><th>Actions</th></tr></thead>
                    <tbody>
                        <tr th:each="p:${products}">
                            <td><img th:src="${p.imageLink}" style="width:48px;height:48px;object-fit:cover;border-radius:8px;border:1px solid rgba(255,255,255,0.08);"></td>
                            <td>
                                <div th:text="${p.name}" style="font-weight:600;"></div>
                                <div style="font-size:0.78rem;color:var(--t3);" th:text="${p.category}"></div>
                            </td>
                            <td style="color:var(--violet-lt);font-weight:700;">₹<span th:text="${p.price}"></span></td>
                            <td>
                                <span th:text="${p.stock}"></span>
                                <span class="badge badge-danger ml-1" th:if="${p.stock <= 5}">Low</span>
                            </td>
                            <td>
                                <span class="badge badge-success" th:if="${p.approved}">Live</span>
                                <span class="badge badge-warning" th:unless="${p.approved}">Pending</span>
                            </td>
                            <td>
                                <a th:href="'/edit-product/'+${p.id}" class="btn btn-warning btn-sm mr-1"><i class="fas fa-edit"></i></a>
                                <a th:href="'/delete-product/'+${p.id}" class="btn btn-danger btn-sm" onclick="return confirm('Delete this product?')"><i class="fas fa-trash"></i></a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <footer class="text-center mt-auto">
        <div class="p-3">© 2026 Ekart. All rights reserved. &nbsp;|&nbsp; <i class="fas fa-heart text-danger"></i> Made with passion</div>
    </footer>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script>
        setTimeout(function(){ $(".alert").fadeTo(400,0).slideUp(400,function(){ $(this).remove(); }); }, 3500);
    </script>
</body>
</html>
