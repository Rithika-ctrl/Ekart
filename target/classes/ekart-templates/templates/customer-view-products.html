<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Products — Ekart</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="/css/ekart-glass.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <a class="navbar-brand" href="/customer/home"><i class="fas fa-shopping-bag mr-2"></i>Ekart</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#nav"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item"><a class="nav-link" href="/view-products"><i class="fas fa-box-open mr-1"></i>Products</a></li>
                <li class="nav-item"><a class="nav-link" href="/search-products"><i class="fas fa-search mr-1"></i>Search</a></li>
                <li class="nav-item"><a class="nav-link" href="/view-cart"><i class="fas fa-shopping-cart mr-1"></i>Cart</a></li>
                <li class="nav-item"><a class="nav-link" href="/view-orders"><i class="fas fa-box mr-1"></i>Orders</a></li>
                <li class="nav-item"><a class="nav-link" href="/logout"><i class="fas fa-sign-out-alt mr-1"></i>Logout</a></li>
            </ul>
        </div>
    </nav>
    <div class="container">
        <div class="alert alert-success alert-dismissible fade show" th:if="${session.success}">
            <i class="fas fa-check-circle"></i><span th:text="${session.success}"></span>
            <button type="button" class="close" data-dismiss="alert"><span>&times;</span></button>
        </div>
        <div class="alert alert-danger alert-dismissible fade show" th:if="${session.failure}">
            <i class="fas fa-exclamation-circle"></i><span th:text="${session.failure}"></span>
            <button type="button" class="close" data-dismiss="alert"><span>&times;</span></button>
        </div>
        <th:block th:text="${@messageRemover.remove()}"></th:block>
        <!-- Budget Mode Bar -->
        <div class="budget-bar mb-4">
            <span style="font-size:1.2rem;">💰</span>
            <label for="budgetSlider" style="margin:0;">Budget Mode</label>
            <input type="range" id="budgetSlider" min="0" max="10000" step="50" value="10000" oninput="applyBudget(this.value)" style="flex:1;min-width:140px;">
            <span class="budget-value" id="budgetDisplay">All Products</span>
            <span id="budgetCount" style="font-size:0.8rem;color:var(--t3);"></span>
            <button class="btn-reset" onclick="resetBudget()">Reset</button>
        </div>

        <div class="row" id="productRow">
            <div class="col-md-4 mb-4 product-card-wrapper animate-in" th:each="p:${products}" th:attr="data-price=${p.price}">
                <div class="card" style="padding:0;overflow:hidden;">
                    <!-- Image -->
                    <div style="position:relative;overflow:hidden;">
                        <img class="card-image" th:src="${p.imageLink}" th:id="'img-'+${p.id}" style="border-radius:0;margin:0;">
                        <span class="budget-badge">✓ In Budget</span>
                        <!-- Price overlay -->
                        <div style="position:absolute;bottom:10px;right:10px;background:rgba(5,7,15,0.85);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:4px 12px;">
                            <span style="font-family:'Clash Display',sans-serif;font-weight:700;font-size:1rem;color:#a78bfa;">₹<span th:text="${p.price}"></span></span>
                        </div>
                    </div>

                    <!-- Thumbnails -->
                    <div th:if="${p.extraImageList != null and !p.extraImageList.isEmpty()}"
                         style="display:flex;gap:6px;padding:10px 12px;background:rgba(0,0,0,0.2);overflow-x:auto;">
                        <img th:src="${p.imageLink}"
                             th:onclick="'document.getElementById(\'img-\'+' + ${p.id} + '+').src=this.src'"
                             style="width:42px;height:42px;object-fit:cover;border-radius:8px;cursor:pointer;border:2px solid var(--violet);transition:all 0.2s;">
                        <img th:each="url:${p.extraImageList}" th:src="${url}"
                             th:onclick="'document.getElementById(\'img-\'+' + ${p.id} + '+').src=this.src'"
                             style="width:42px;height:42px;object-fit:cover;border-radius:8px;cursor:pointer;border:2px solid rgba(255,255,255,0.1);transition:all 0.2s;">
                    </div>

                    <!-- Video -->
                    <div th:if="${p.videoLink != null and !#strings.isEmpty(p.videoLink)}" style="padding:0 12px 8px;">
                        <video controls style="width:100%;border-radius:10px;max-height:160px;">
                            <source th:src="${p.videoLink}" type="video/mp4">
                        </video>
                    </div>

                    <!-- Info -->
                    <div style="padding:1.25rem;">
                        <h4 style="margin-bottom:0.25rem;" th:text="${p.name}"></h4>
                        <p style="font-size:0.82rem;margin-bottom:0.75rem;color:var(--t2);" th:text="${p.description}"></p>
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <span class="badge badge-info" th:text="${p.category}"></span>
                            <span style="font-size:0.82rem;color:var(--t3);">
                                <i class="fas fa-cubes mr-1"></i><span th:text="${p.stock}"></span> left
                            </span>
                        </div>

                        <!-- Reviews -->
                        <div style="border-top:1px solid rgba(255,255,255,0.06);padding-top:1rem;margin-bottom:1rem;">
                            <div style="font-size:0.78rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.6rem;">
                                <i class="fas fa-star mr-1" style="color:var(--amber-lt);"></i>Reviews
                            </div>
                            <div th:each="review:${p.reviews}" class="review-box">
                                <div class="d-flex justify-content-between mb-1">
                                    <span style="color:var(--amber-lt);font-size:0.8rem;">
                                        <i class="fas fa-star" th:each="i:${#numbers.sequence(1,review.rating)}"></i>
                                    </span>
                                    <small style="color:var(--t3);" th:text="${review.customerName}"></small>
                                </div>
                                <p style="font-size:0.82rem;margin:0;" th:text="${review.comment}"></p>
                            </div>
                            <form action="/add-review" method="post" class="mt-2">
                                <input type="hidden" name="productId" th:value="${p.id}">
                                <div class="input-group input-group-sm">
                                    <select name="rating" class="custom-select" style="max-width:80px;" required>
                                        <option value="5">5 ★</option>
                                        <option value="4">4 ★</option>
                                        <option value="3">3 ★</option>
                                        <option value="2">2 ★</option>
                                        <option value="1">1 ★</option>
                                    </select>
                                    <input type="text" name="comment" class="form-control" placeholder="Write a review..." required>
                                    <div class="input-group-append">
                                        <button class="btn btn-primary btn-sm" type="submit">Post</button>
                                    </div>
                                </div>
                            </form>
                        </div>

                        <a th:href="'/add-cart/'+${p.id}" class="btn btn-primary btn-block">
                            <i class="fas fa-cart-plus mr-2"></i>Add to Cart
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div class="text-center mt-2 mb-4">
            <a href="/customer/home" class="btn btn-secondary">
                <i class="fas fa-arrow-left mr-2"></i>Back to Dashboard
            </a>
        </div>
    </div>
    <footer class="text-center mt-auto">
        <div class="p-3">© 2026 Ekart. All rights reserved. &nbsp;|&nbsp; <i class="fas fa-heart text-danger"></i> Made with passion</div>
    </footer>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script>
        setTimeout(function(){ $(".alert").fadeTo(400,0).slideUp(400,function(){ $(this).remove(); }); }, 3500);
    </script>
    <script>
    var maxPrice=0;
    document.querySelectorAll('.product-card-wrapper').forEach(function(el){
        var p=parseFloat(el.getAttribute('data-price'))||0; if(p>maxPrice) maxPrice=p;
    });
    var sliderMax=Math.ceil(maxPrice/500)*500||10000;
    var slider=document.getElementById('budgetSlider');
    slider.max=sliderMax; slider.value=sliderMax;

    function applyBudget(val){
        val=parseFloat(val);
        var cards=document.querySelectorAll('.product-card-wrapper'), visible=0;
        document.getElementById('productRow').classList.add('budget-mode-active');
        cards.forEach(function(el){
            var price=parseFloat(el.getAttribute('data-price'))||0;
            if(price<=val){el.classList.remove('product-over-budget');el.classList.add('within-budget');visible++;}
            else{el.classList.add('product-over-budget');el.classList.remove('within-budget');}
        });
        document.getElementById('budgetDisplay').textContent='₹'+val.toLocaleString('en-IN');
        document.getElementById('budgetCount').textContent=visible+' of '+cards.length;
    }
    function resetBudget(){
        slider.value=slider.max;
        document.getElementById('budgetDisplay').textContent='All Products';
        document.getElementById('budgetCount').textContent='';
        document.getElementById('productRow').classList.remove('budget-mode-active');
        document.querySelectorAll('.product-card-wrapper').forEach(function(el){
            el.classList.remove('product-over-budget','within-budget');
        });
    }
    </script>
</body>
</html>
