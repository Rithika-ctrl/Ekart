<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders — Ekart</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="/css/ekart-glass.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <a class="navbar-brand" href="/customer/home"><i class="fas fa-shopping-bag mr-2"></i>Ekart</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#nav"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item"><a class="nav-link" href="/view-products"><i class="fas fa-box-open mr-1"></i>Products</a></li>
                <li class="nav-item"><a class="nav-link" href="/search-products"><i class="fas fa-search mr-1"></i>Search</a></li>
                <li class="nav-item"><a class="nav-link" href="/view-cart"><i class="fas fa-shopping-cart mr-1"></i>Cart</a></li>
                <li class="nav-item"><a class="nav-link" href="/view-orders"><i class="fas fa-box mr-1"></i>Orders</a></li>
                <li class="nav-item"><a class="nav-link" href="/logout"><i class="fas fa-sign-out-alt mr-1"></i>Logout</a></li>
            </ul>
        </div>
    </nav>
    <div class="container">
        <div class="alert alert-success alert-dismissible fade show" th:if="${session.success}">
            <i class="fas fa-check-circle"></i><span th:text="${session.success}"></span>
            <button type="button" class="close" data-dismiss="alert"><span>&times;</span></button>
        </div>
        <div class="alert alert-danger alert-dismissible fade show" th:if="${session.failure}">
            <i class="fas fa-exclamation-circle"></i><span th:text="${session.failure}"></span>
            <button type="button" class="close" data-dismiss="alert"><span>&times;</span></button>
        </div>
        <th:block th:text="${@messageRemover.remove()}"></th:block>
        <h2 class="mb-4"><i class="fas fa-clipboard-list mr-2" style="color:var(--violet-lt);"></i>My Orders</h2>
        <div th:if="${orders == null or #lists.isEmpty(orders)}" class="text-center py-5">
            <div style="font-size:4rem;margin-bottom:1rem;opacity:0.4;">📦</div>
            <h4 style="color:var(--t2);">No orders yet</h4>
            <a href="/view-products" class="btn btn-primary mt-3">Start Shopping</a>
        </div>
        <div class="card animate-in" th:unless="${orders == null or #lists.isEmpty(orders)}" style="padding:0;overflow:hidden;">
            <div class="table-responsive">
                <table class="table">
                    <thead><tr>
                        <th>#</th><th>Product</th><th>Price</th><th>Date</th><th>Status</th><th>Actions</th>
                    </tr></thead>
                    <tbody>
                        <tr th:each="order,iter:${orders}">
                            <td style="font-weight:600;color:var(--t3);" th:text="${iter.index+1}"></td>
                            <td>
                                <div class="d-flex align-items-center gap-2" style="gap:0.75rem;">
                                    <img th:src="${order.product.imageLink}" style="width:44px;height:44px;object-fit:cover;border-radius:8px;border:1px solid rgba(255,255,255,0.08);">
                                    <span th:text="${order.product.name}"></span>
                                </div>
                            </td>
                            <td style="font-weight:600;color:var(--violet-lt);">₹<span th:text="${order.product.price}"></span></td>
                            <td style="color:var(--t2);font-size:0.85rem;" th:text="${order.orderDate}"></td>
                            <td>
                                <span class="badge badge-success" th:if="${order.status == 'DELIVERED'}" th:text="${order.status}"></span>
                                <span class="badge badge-info"    th:if="${order.status == 'SHIPPED'}"   th:text="${order.status}"></span>
                                <span class="badge badge-warning" th:if="${order.status == 'PENDING'}"   th:text="${order.status}"></span>
                                <span class="badge badge-danger"  th:if="${order.status == 'CANCELLED'}" th:text="${order.status}"></span>
                            </td>
                            <td>
                                <a th:if="${order.canCancel}" th:href="'/cancel-order/'+${order.id}" class="btn btn-danger btn-sm">Cancel</a>
                                <a th:if="${order.canReplace}" th:href="'/replace-order/'+${order.id}" class="btn btn-warning btn-sm">Replace</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <footer class="text-center mt-auto">
        <div class="p-3">© 2026 Ekart. All rights reserved. &nbsp;|&nbsp; <i class="fas fa-heart text-danger"></i> Made with passion</div>
    </footer>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script>
        setTimeout(function(){ $(".alert").fadeTo(400,0).slideUp(400,function(){ $(this).remove(); }); }, 3500);
    </script>
</body>
</html>
