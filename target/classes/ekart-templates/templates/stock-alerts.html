<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Alerts — Ekart</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="/css/ekart-glass.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <a class="navbar-brand" href="/vendor/home"><i class="fas fa-store mr-2"></i>Ekart Vendor</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#nav"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item"><a class="nav-link" href="/add-product"><i class="fas fa-plus mr-1"></i>Add Product</a></li>
                <li class="nav-item"><a class="nav-link" href="/manage-products"><i class="fas fa-tasks mr-1"></i>Products</a></li>
                <li class="nav-item"><a class="nav-link" href="/vendor/sales-report"><i class="fas fa-chart-line mr-1"></i>Sales</a></li>
                <li class="nav-item"><a class="nav-link" href="/stock-alerts"><i class="fas fa-bell mr-1"></i>Alerts</a></li>
                <li class="nav-item"><a class="nav-link" href="/logout"><i class="fas fa-sign-out-alt mr-1"></i>Logout</a></li>
            </ul>
        </div>
    </nav>
    <div class="container">
        <div class="alert alert-success alert-dismissible fade show" th:if="${session.success}">
            <i class="fas fa-check-circle"></i><span th:text="${session.success}"></span>
            <button type="button" class="close" data-dismiss="alert"><span>&times;</span></button>
        </div>
        <div class="alert alert-danger alert-dismissible fade show" th:if="${session.failure}">
            <i class="fas fa-exclamation-circle"></i><span th:text="${session.failure}"></span>
            <button type="button" class="close" data-dismiss="alert"><span>&times;</span></button>
        </div>
        <th:block th:text="${@messageRemover.remove()}"></th:block>
        <h2 class="mb-1"><i class="fas fa-exclamation-triangle mr-2" style="color:var(--amber-lt);"></i>Stock Alerts</h2>
        <p class="mb-4" style="color:var(--t2);font-size:0.9rem;">Products running low on inventory.</p>
        <div class="row">
            <div class="col-md-4 mb-4 animate-in" th:each="p:${lowStockProducts}">
                <div class="card" style="padding:1.25rem;">
                    <div class="d-flex align-items-center mb-3" style="gap:1rem;">
                        <img th:src="${p.imageLink}" style="width:56px;height:56px;object-fit:cover;border-radius:10px;border:1px solid rgba(255,255,255,0.08);">
                        <div>
                            <div style="font-weight:600;font-family:'Clash Display',sans-serif;" th:text="${p.name}"></div>
                            <div style="font-size:0.78rem;color:var(--t3);" th:text="${p.category}"></div>
                        </div>
                    </div>
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <div style="font-size:0.75rem;color:var(--t3);text-transform:uppercase;letter-spacing:0.05em;">Stock Remaining</div>
                            <div style="font-size:1.5rem;font-weight:700;font-family:'Clash Display',sans-serif;color:var(--amber-lt);" th:text="${p.stock}"></div>
                        </div>
                        <a th:href="'/edit-product/'+${p.id}" class="btn btn-warning btn-sm">
                            <i class="fas fa-plus mr-1"></i>Restock
                        </a>
                    </div>
                    <div class="progress mt-3" style="height:4px;">
                        <div class="progress-bar bg-warning" th:attr="style='width:'+${p.stock*10}+'%;'"></div>
                    </div>
                </div>
            </div>
        </div>
        <div th:if="${lowStockProducts == null or #lists.isEmpty(lowStockProducts)}" class="text-center py-5">
            <div style="font-size:4rem;margin-bottom:1rem;">✅</div>
            <h4 style="color:var(--teal-lt);">All products are well stocked!</h4>
        </div>
    </div>
    <footer class="text-center mt-auto">
        <div class="p-3">© 2026 Ekart. All rights reserved. &nbsp;|&nbsp; <i class="fas fa-heart text-danger"></i> Made with passion</div>
    </footer>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script>
        setTimeout(function(){ $(".alert").fadeTo(400,0).slideUp(400,function(){ $(this).remove(); }); }, 3500);
    </script>
</body>
</html>
