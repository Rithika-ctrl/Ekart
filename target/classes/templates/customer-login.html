<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekart - Customer Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --yellow:       #f5a800;
            --yellow-d:     #d48f00;
            --glass-border: rgba(255, 255, 255, 0.22);
            --glass-card:   rgba(255, 255, 255, 0.13);
            --text-white:   #ffffff;
            --text-light:   rgba(255,255,255,0.80);
            --text-dim:     rgba(255,255,255,0.50);
            --input-bg:     rgba(255, 255, 255, 0.08);
            --input-border: rgba(255, 255, 255, 0.20);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            color: var(--text-white);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
        }

        /* ── BACKGROUND ── */
        .bg-layer {
            position: fixed; inset: 0; z-index: -1;
            overflow: hidden;
        }
        .bg-layer::before {
            content: '';
            position: absolute; inset: -20px;
            background: url('https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?w=1600&q=80') center/cover no-repeat;
            filter: blur(6px);
            transform: scale(1.08);
        }
        .bg-layer::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(
                180deg,
                rgba(5, 8, 20, 0.82) 0%,
                rgba(8, 12, 28, 0.78) 40%,
                rgba(5, 8, 20, 0.88) 100%
            );
        }

        /* ── NAV ── */
        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            padding: 1rem 3rem;
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(0,0,0,0.25);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--glass-border);
        }
        .nav-brand {
            font-size: 1.6rem; font-weight: 700;
            color: var(--text-white); text-decoration: none;
            letter-spacing: 0.04em;
            display: flex; align-items: center; gap: 0.5rem;
        }
        .nav-brand span { color: var(--yellow); }

        .nav-links { display: flex; align-items: center; gap: 0.25rem; list-style: none; }
        .nav-links a {
            color: var(--text-light); text-decoration: none;
            font-size: 0.82rem; font-weight: 500;
            padding: 0.45rem 0.9rem; border-radius: 6px;
            transition: all 0.2s;
        }
        .nav-links a:hover { color: white; background: rgba(255,255,255,0.1); }

        .dropdown { position: relative; }
        .dropdown > a { display: flex; align-items: center; gap: 0.35rem; cursor: pointer; }
        .dropdown-menu {
            position: absolute; top: calc(100% + 0.75rem); right: 0;
            background: rgba(10, 12, 30, 0.90);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 10px; padding: 0.5rem; min-width: 210px;
            opacity: 0; visibility: hidden; transform: translateY(-6px);
            transition: all 0.22s; list-style: none;
        }
        .dropdown:hover .dropdown-menu { opacity: 1; visibility: visible; transform: translateY(0); }
        .dropdown-menu li a {
            display: flex; align-items: center; gap: 0.625rem;
            padding: 0.6rem 1rem; border-radius: 7px;
            color: var(--text-light); text-decoration: none; font-size: 0.82rem;
            transition: background 0.15s;
        }
        .dropdown-menu li a:hover { background: rgba(255,255,255,0.1); color: white; }
        .dropdown-menu .divider { border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 0.3rem 0; }

        /* ── ALERTS ── */
        .alert-stack {
            position: fixed; top: 5rem; right: 1.5rem;
            z-index: 200; display: flex; flex-direction: column; gap: 0.5rem;
        }
        .alert {
            padding: 0.875rem 1.25rem;
            background: rgba(10,12,30,0.88); backdrop-filter: blur(16px);
            border: 1px solid; border-radius: 10px;
            display: flex; align-items: center; gap: 0.625rem;
            font-size: 0.825rem; min-width: 260px;
            animation: slideIn 0.3s ease both;
        }
        .alert-success { border-color: rgba(34,197,94,0.45); color: #22c55e; }
        .alert-danger  { border-color: rgba(255,100,80,0.45); color: #ff8060; }
        .alert-close { margin-left: auto; background: none; border: none; color: inherit; cursor: pointer; opacity: 0.6; font-size: 1rem; }
        @keyframes slideIn { from{opacity:0;transform:translateX(14px)} to{opacity:1;transform:translateX(0)} }

        /* ── LOGIN CARD ── */
        .login-card {
            background: var(--glass-card);
            backdrop-filter: blur(22px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            width: 100%; max-width: 420px;
            box-shadow: 0 24px 80px rgba(0,0,0,0.45);
            animation: fadeUp 0.55s ease both;
            text-align: center;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card-icon {
            width: 60px; height: 60px;
            background: rgba(245,168,0,0.15);
            border: 2px solid rgba(245,168,0,0.35);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.25rem;
            font-size: 1.4rem; color: var(--yellow);
        }

        .login-card h1 {
            font-size: 1.6rem; font-weight: 700;
            color: white; margin-bottom: 0.4rem;
        }
        .login-card .subtitle {
            font-size: 0.8rem; color: var(--text-dim);
            margin-bottom: 2rem;
        }

        /* ── FORM ── */
        .form-group { margin-bottom: 1.1rem; text-align: left; }
        .form-group label {
            display: block;
            font-size: 0.72rem; font-weight: 600;
            letter-spacing: 0.08em; text-transform: uppercase;
            color: var(--text-dim); margin-bottom: 0.45rem;
        }
        .input-wrap { position: relative; }
        .input-wrap i.field-icon {
            position: absolute; left: 0.875rem; top: 50%;
            transform: translateY(-50%);
            font-size: 0.85rem; color: var(--text-dim);
            pointer-events: none; transition: color 0.2s;
        }
        .input-wrap:focus-within i.field-icon { color: var(--yellow); }
        .input-wrap input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 10px;
            padding: 0.75rem 0.875rem 0.75rem 2.5rem;
            font-family: 'Poppins', sans-serif;
            font-size: 0.875rem; color: white;
            transition: all 0.25s; outline: none;
        }
        .input-wrap input::placeholder { color: rgba(255,255,255,0.28); }
        .input-wrap input:focus {
            border-color: rgba(245,168,0,0.55);
            background: rgba(255,255,255,0.12);
            box-shadow: 0 0 0 3px rgba(245,168,0,0.12);
        }
        .pw-toggle {
            position: absolute; right: 0.875rem; top: 50%;
            transform: translateY(-50%);
            cursor: pointer; color: var(--text-dim); font-size: 0.85rem;
            transition: color 0.2s;
        }
        .pw-toggle:hover { color: var(--yellow); }

        .forgot-link {
            display: block; text-align: right;
            font-size: 0.75rem; color: var(--yellow);
            text-decoration: none; margin-top: 0.5rem;
            transition: opacity 0.2s;
        }
        .forgot-link:hover { opacity: 0.8; text-decoration: underline; }

        .form-divider {
            border: none; border-top: 1px solid rgba(255,255,255,0.1);
            margin: 1.5rem 0;
        }

        .btn-submit {
            width: 100%;
            background: var(--yellow); color: #1a1000;
            border: none; border-radius: 50px;
            padding: 0.9rem;
            font-family: 'Poppins', sans-serif;
            font-size: 0.875rem; font-weight: 700;
            letter-spacing: 0.1em; text-transform: uppercase;
            cursor: pointer; transition: all 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
            box-shadow: 0 6px 24px rgba(245,168,0,0.35);
        }
        .btn-submit:hover {
            background: var(--yellow-d);
            transform: translateY(-2px);
            box-shadow: 0 10px 32px rgba(245,168,0,0.5);
        }

        .card-footer-text {
            margin-top: 1.5rem;
            font-size: 0.8rem; color: var(--text-dim);
        }
        .card-footer-text a {
            color: var(--yellow); font-weight: 600;
            text-decoration: none; margin-left: 0.25rem;
        }
        .card-footer-text a:hover { text-decoration: underline; }

        /* role switcher pills */
        .role-pills {
            display: flex; gap: 0.5rem; justify-content: center;
            margin-bottom: 1.75rem; flex-wrap: wrap;
        }
        .role-pill {
            font-size: 0.7rem; font-weight: 600; letter-spacing: 0.06em;
            padding: 0.35rem 1rem; border-radius: 50px;
            text-decoration: none; border: 1px solid var(--glass-border);
            color: var(--text-dim); transition: all 0.2s;
        }
        .role-pill:hover { border-color: rgba(245,168,0,0.4); color: var(--text-light); }
        .role-pill.active {
            background: rgba(245,168,0,0.15);
            border-color: rgba(245,168,0,0.5);
            color: var(--yellow);
        }

        /* brand watermark */
        .brand-mark {
            position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
            font-size: 0.72rem; color: var(--text-dim); letter-spacing: 0.1em;
        }
        .brand-mark span { color: var(--yellow); font-weight: 700; }

        @media(max-width: 480px) {
            nav { padding: 0.875rem 1.25rem; }
            .login-card { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>

<div class="bg-layer"></div>

<!-- Thymeleaf alerts -->
<div class="alert-stack">
    <div class="alert alert-success" th:if="${session.success}">
        <i class="fas fa-check-circle"></i>
        <span th:text="${session.success}"></span>
        <button class="alert-close" onclick="this.parentElement.remove()">×</button>
    </div>
    <div class="alert alert-danger" th:if="${session.failure}">
        <i class="fas fa-exclamation-circle"></i>
        <span th:text="${session.failure}"></span>
        <button class="alert-close" onclick="this.parentElement.remove()">×</button>
    </div>
    <th:block th:text="${@messageRemover.remove()}"></th:block>
</div>

<!-- ── NAV ── -->
<nav>
    <a href="/" class="nav-brand">
        <i class="fas fa-shopping-cart" style="font-size:1.1rem;"></i>
        Ekart
    </a>
    <ul class="nav-links">
        <li><a href="/products">Shop</a></li>
        <li class="dropdown">
            <a href="#">
                <i class="fas fa-user-circle"></i> Account
                <i class="fas fa-angle-down" style="font-size:.65rem;"></i>
            </a>
            <ul class="dropdown-menu">
                <li><a href="/customer/login"><i class="fas fa-sign-in-alt" style="color:var(--yellow);width:14px;"></i> Customer Login</a></li>
                <li><a href="/customer/register"><i class="fas fa-user-plus" style="color:#7dc97d;width:14px;"></i> Customer Register</a></li>
                <li><hr class="divider"></li>
                <li><a href="/vendor/login"><i class="fas fa-store" style="color:var(--yellow);width:14px;"></i> Vendor Login</a></li>
                <li><a href="/vendor/register"><i class="fas fa-store" style="color:#7dc97d;width:14px;"></i> Vendor Register</a></li>
                <li><hr class="divider"></li>
                <li><a href="/admin/login"><i class="fas fa-shield-alt" style="color:rgba(255,255,255,0.4);width:14px;"></i> Admin Login</a></li>
            </ul>
        </li>
        <li><a href="/customer/register" style="background:var(--yellow);color:#1a1000;font-weight:700;border-radius:50px;padding:.45rem 1.2rem;">Register</a></li>
    </ul>
</nav>

<!-- ── LOGIN CARD ── -->
<div class="login-card">

    <div class="card-icon">
        <i class="fas fa-user-lock"></i>
    </div>

    <h1>Welcome Back</h1>
    <p class="subtitle">Sign in to your Ekart account</p>

    <!-- Role switcher -->
    <div class="role-pills">
        <a href="/customer/login" class="role-pill active"><i class="fas fa-user" style="font-size:.65rem;"></i> Customer</a>
        <a href="/vendor/login"   class="role-pill"><i class="fas fa-store" style="font-size:.65rem;"></i> Vendor</a>
        <a href="/admin/login"    class="role-pill"><i class="fas fa-shield-alt" style="font-size:.65rem;"></i> Admin</a>
    </div>

    <form action="/customer/login" method="post">

        <!-- Email -->
        <div class="form-group">
            <label for="email">Email Address</label>
            <div class="input-wrap">
                <i class="fas fa-envelope field-icon"></i>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>
        </div>

        <!-- Password -->
        <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrap">
                <i class="fas fa-lock field-icon"></i>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
                <span class="pw-toggle" onclick="togglePw()">
                    <i class="fas fa-eye" id="pw-eye"></i>
                </span>
            </div>
            <a href="/customer/forgot-password" class="forgot-link">Forgot password?</a>
        </div>

        <hr class="form-divider">

        <button type="submit" class="btn-submit">
            <i class="fas fa-sign-in-alt"></i> Log In
        </button>
    </form>

    <div class="card-footer-text">
        Don't have an account?
        <a href="/customer/register">Sign up free</a>
    </div>
</div>

<div class="brand-mark">Ekart · Secure Login</div>

<script>
    function togglePw() {
        const input = document.getElementById('password');
        const icon  = document.getElementById('pw-eye');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }

    // Auto-dismiss alerts
    setTimeout(() => {
        document.querySelectorAll('.alert-stack .alert').forEach(el => {
            el.style.transition = 'opacity 0.5s';
            el.style.opacity = '0';
            setTimeout(() => el.remove(), 500);
        });
    }, 2500);
</script>

</body>
</html>
