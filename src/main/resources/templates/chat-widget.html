<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!--
    ================================================================
    Ekart AI Assistant — Floating Chat Widget
    ================================================================
    HOW TO ADD TO ANY PAGE:
    Paste this ONE line just before </body> in any html template:

    <div th:replace="~{chat-widget :: chatWidget}"></div>

    ================================================================
-->

<th:block th:fragment="chatWidget">

<style>
    /* ── FAB Button ── */
    #chat-fab {
        position: fixed; bottom: 2rem; right: 2rem; z-index: 999;
        width: 56px; height: 56px; border-radius: 50%;
        background: linear-gradient(135deg, #f5a800, #d48f00);
        border: none; cursor: pointer;
        box-shadow: 0 6px 24px rgba(245,168,0,0.45);
        display: flex; align-items: center; justify-content: center;
        font-size: 1.4rem; color: #1a1000;
        transition: transform 0.3s, box-shadow 0.3s;
        animation: fabPop 0.4s cubic-bezier(0.23,1,0.32,1) both;
    }
    #chat-fab:hover {
        transform: scale(1.12);
        box-shadow: 0 10px 32px rgba(245,168,0,0.6);
    }
    #chat-fab .fab-badge {
        position: absolute; top: -2px; right: -2px;
        width: 14px; height: 14px; border-radius: 50%;
        background: #22c55e; border: 2px solid #0a0c1e;
        animation: pulse-dot 2s infinite;
    }

    /* ── Chat Window ── */
    #chat-window {
        position: fixed; bottom: 5.5rem; right: 2rem; z-index: 998;
        width: 340px;
        background: rgba(8, 12, 28, 0.97);
        border: 1px solid rgba(245,168,0,0.3);
        border-radius: 20px;
        box-shadow: 0 24px 60px rgba(0,0,0,0.6);
        display: flex; flex-direction: column;
        overflow: hidden;
        transform: scale(0.85) translateY(20px);
        opacity: 0; pointer-events: none;
        transition: all 0.3s cubic-bezier(0.23,1,0.32,1);
        max-height: 480px;
    }
    #chat-window.open {
        transform: scale(1) translateY(0);
        opacity: 1; pointer-events: all;
    }

    /* ── Header ── */
    .chat-header {
        display: flex; align-items: center; gap: 0.75rem;
        padding: 1rem 1.25rem;
        background: linear-gradient(135deg, rgba(245,168,0,0.2), rgba(245,168,0,0.05));
        border-bottom: 1px solid rgba(245,168,0,0.2);
        flex-shrink: 0;
    }
    .chat-header-icon {
        width: 36px; height: 36px; border-radius: 50%;
        background: linear-gradient(135deg, #f5a800, #d48f00);
        display: flex; align-items: center; justify-content: center;
        font-size: 1rem; color: #1a1000; flex-shrink: 0;
    }
    .chat-header-info { flex: 1; }
    .chat-header-info strong {
        display: block; font-size: 0.875rem;
        font-family: 'Poppins', sans-serif;
        color: white; font-weight: 700;
    }
    .chat-header-info span {
        font-size: 0.7rem; color: #22c55e;
        font-family: 'Poppins', sans-serif;
    }
    .chat-close-btn {
        background: none; border: none; color: rgba(255,255,255,0.4);
        font-size: 1.1rem; cursor: pointer; padding: 0.2rem;
        transition: color 0.2s;
    }
    .chat-close-btn:hover { color: white; }

    /* ── Messages ── */
    .chat-messages {
        flex: 1; overflow-y: auto; padding: 1rem;
        display: flex; flex-direction: column; gap: 0.75rem;
        scrollbar-width: thin; scrollbar-color: rgba(245,168,0,0.2) transparent;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: rgba(245,168,0,0.25); border-radius: 4px; }

    .chat-msg {
        display: flex; gap: 0.5rem; align-items: flex-end;
        animation: msgIn 0.25s ease both;
    }
    .chat-msg.user  { flex-direction: row-reverse; }
    .chat-bubble {
        max-width: 80%; padding: 0.6rem 0.9rem;
        border-radius: 14px; font-size: 0.8rem; line-height: 1.5;
        font-family: 'Poppins', sans-serif;
    }
    .chat-msg.bot  .chat-bubble {
        background: rgba(255,255,255,0.08);
        color: rgba(255,255,255,0.88);
        border-bottom-left-radius: 4px;
    }
    .chat-msg.user .chat-bubble {
        background: linear-gradient(135deg, #f5a800, #d48f00);
        color: #1a1000; font-weight: 600;
        border-bottom-right-radius: 4px;
    }
    .chat-avatar {
        width: 26px; height: 26px; border-radius: 50%;
        background: rgba(245,168,0,0.2);
        display: flex; align-items: center; justify-content: center;
        font-size: 0.7rem; flex-shrink: 0; color: #f5a800;
    }
    .chat-msg.user .chat-avatar { background: rgba(245,168,0,0.3); }

    /* ── Typing indicator ── */
    .typing-dots {
        display: flex; align-items: center; gap: 4px; padding: 0.4rem 0;
    }
    .typing-dots span {
        width: 6px; height: 6px; border-radius: 50%;
        background: rgba(245,168,0,0.6);
        animation: typingBounce 1.2s infinite ease-in-out;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    /* ── Quick Suggestions ── */
    .chat-suggestions {
        padding: 0.5rem 1rem 0;
        display: flex; gap: 0.4rem; flex-wrap: wrap; flex-shrink: 0;
    }
    .suggestion-chip {
        background: rgba(245,168,0,0.1);
        border: 1px solid rgba(245,168,0,0.25);
        color: #f5a800; border-radius: 20px;
        padding: 0.25rem 0.7rem; font-size: 0.68rem;
        font-family: 'Poppins', sans-serif; font-weight: 600;
        cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .suggestion-chip:hover { background: rgba(245,168,0,0.2); }

    /* ── Input ── */
    .chat-input-row {
        display: flex; gap: 0.5rem;
        padding: 0.75rem 1rem;
        border-top: 1px solid rgba(255,255,255,0.08);
        flex-shrink: 0;
    }
    #chat-input {
        flex: 1; background: rgba(255,255,255,0.07);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 10px; padding: 0.55rem 0.85rem;
        color: white; font-family: 'Poppins', sans-serif; font-size: 0.8rem;
        outline: none; transition: border-color 0.2s;
        resize: none;
    }
    #chat-input:focus { border-color: rgba(245,168,0,0.5); }
    #chat-input::placeholder { color: rgba(255,255,255,0.3); }
    #chat-send {
        width: 36px; height: 36px; border-radius: 10px;
        background: linear-gradient(135deg, #f5a800, #d48f00);
        border: none; cursor: pointer; flex-shrink: 0;
        display: flex; align-items: center; justify-content: center;
        font-size: 0.9rem; color: #1a1000;
        transition: transform 0.2s, opacity 0.2s;
        align-self: flex-end;
    }
    #chat-send:hover  { transform: scale(1.08); }
    #chat-send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* ── Animations ── */
    @keyframes fabPop       { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes msgIn        { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes typingBounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }
    @keyframes pulse-dot    { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.4); opacity: 0.6; } }

    @media(max-width: 420px) {
        #chat-window { width: calc(100vw - 2rem); right: 1rem; bottom: 5rem; }
        #chat-fab { bottom: 1.25rem; right: 1.25rem; }
    }
</style>

<!-- FAB Button -->
<button id="chat-fab" onclick="toggleChat()" title="Ekart Assistant">
    <span class="fab-badge"></span>
    🤖
</button>

<!-- Chat Window -->
<div id="chat-window">

    <!-- Header -->
    <div class="chat-header">
        <div class="chat-header-icon">🤖</div>
        <div class="chat-header-info">
            <strong>Ekart Assistant</strong>
            <span>● Online — Ask me anything!</span>
        </div>
        <button class="chat-close-btn" onclick="toggleChat()">
            <i class="fas fa-times"></i>
        </button>
    </div>

    <!-- Messages -->
    <div class="chat-messages" id="chat-messages">
        <div class="chat-msg bot">
            <div class="chat-avatar">🤖</div>
            <div class="chat-bubble">
                Hi! 👋 I'm your Ekart Assistant. I can help you with orders, products, payments, delivery and more. What do you need?
            </div>
        </div>
    </div>

    <!-- Quick Suggestions -->
    <div class="chat-suggestions" id="chat-suggestions">
        <button class="suggestion-chip" onclick="sendSuggestion(this)">Track my order</button>
        <button class="suggestion-chip" onclick="sendSuggestion(this)">Return policy</button>
        <button class="suggestion-chip" onclick="sendSuggestion(this)">Payment options</button>
    </div>

    <!-- Input -->
    <div class="chat-input-row">
        <input id="chat-input" type="text"
               placeholder="Type your message..."
               onkeydown="if(event.key==='Enter' && !event.shiftKey){ event.preventDefault(); sendMessage(); }">
        <button id="chat-send" onclick="sendMessage()">
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>

</div>

<script>
    var chatOpen = false;
    var chatLoading = false;

    function toggleChat() {
        chatOpen = !chatOpen;
        document.getElementById('chat-window').classList.toggle('open', chatOpen);
        if (chatOpen) {
            document.getElementById('chat-input').focus();
            // Remove badge dot once opened
            var badge = document.querySelector('#chat-fab .fab-badge');
            if (badge) badge.style.display = 'none';
        }
    }

    function sendSuggestion(btn) {
        var text = btn.textContent.trim();
        // Hide suggestions after first use
        document.getElementById('chat-suggestions').style.display = 'none';
        sendMessage(text);
    }

    function sendMessage(overrideText) {
        if (chatLoading) return;

        var input   = document.getElementById('chat-input');
        var message = overrideText || input.value.trim();
        if (!message) return;

        input.value = '';

        // Add user bubble
        appendMessage('user', message);

        // Show typing indicator
        var typingId = showTyping();
        chatLoading = true;
        document.getElementById('chat-send').disabled = true;

        // Call backend
        fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: message })
        })
        .then(function(res) { return res.json(); })
        .then(function(data) {
            removeTyping(typingId);
            appendMessage('bot', data.reply || 'Sorry, I could not understand that.');
        })
        .catch(function() {
            removeTyping(typingId);
            appendMessage('bot', 'Sorry, something went wrong. Please try again.');
        })
        .finally(function() {
            chatLoading = false;
            document.getElementById('chat-send').disabled = false;
            document.getElementById('chat-input').focus();
        });
    }

    function appendMessage(role, text) {
        var messages = document.getElementById('chat-messages');
        var avatar   = role === 'bot' ? '🤖' : '👤';
        var div = document.createElement('div');
        div.className = 'chat-msg ' + role;
        div.innerHTML =
            '<div class="chat-avatar">' + avatar + '</div>' +
            '<div class="chat-bubble">' + escapeHtml(text) + '</div>';
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
    }

    function showTyping() {
        var messages = document.getElementById('chat-messages');
        var id = 'typing-' + Date.now();
        var div = document.createElement('div');
        div.className = 'chat-msg bot'; div.id = id;
        div.innerHTML =
            '<div class="chat-avatar">🤖</div>' +
            '<div class="chat-bubble"><div class="typing-dots">' +
            '<span></span><span></span><span></span></div></div>';
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
        return id;
    }

    function removeTyping(id) {
        var el = document.getElementById(id);
        if (el) el.remove();
    }

    function escapeHtml(text) {
        return text
            .replace(/&/g,  '&amp;')
            .replace(/</g,  '&lt;')
            .replace(/>/g,  '&gt;')
            .replace(/\n/g, '<br>');
    }
</script>

</th:block>
</html>
