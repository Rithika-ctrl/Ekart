<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekart - Delivery Login</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 576 512'%3E%3Cpath fill='%23f5a800' d='M528.12 301.319l47.273-208C578.806 78.301 567.391 64 551.99 64H159.208l-9.166-44.81C147.758 8.021 137.93 0 126.529 0H24C10.745 0 0 10.745 0 24v16c0 13.255 10.745 24 24 24h69.883l70.248 343.435C147.325 417.1 136 435.222 136 456c0 30.928 25.072 56 56 56s56-25.072 56-56c0-15.674-6.447-29.835-16.824-40h209.647C430.447 426.165 424 440.326 424 456c0 30.928 25.072 56 56 56s56-25.072 56-56c0-22.172-12.888-41.332-31.579-50.405l5.517-24.276c3.413-15.018-8.002-29.319-23.403-29.319H218.117l-6.545-32h293.145c11.206 0 20.92-7.754 23.403-18.681z'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--yellow:#f5a800;--yellow-d:#d48f00;--glass-border:rgba(255,255,255,0.22);--glass-card:rgba(255,255,255,0.13);--glass-nav:rgba(0,0,0,0.25);--text-white:#ffffff;--text-light:rgba(255,255,255,0.80);--text-dim:rgba(255,255,255,0.50);}
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Poppins',sans-serif;min-height:100vh;color:var(--text-white);display:flex;flex-direction:column;}
        .bg-layer{position:fixed;inset:0;z-index:-1;overflow:hidden;}
        .bg-layer::before{content:'';position:absolute;inset:-20px;background:url('https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?w=1600&q=80') center/cover no-repeat;filter:blur(6px);transform:scale(1.08);}
        .bg-layer::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(5,8,20,0.82) 0%,rgba(8,12,28,0.78) 40%,rgba(5,8,20,0.88) 100%);}
        nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:1rem 3rem;display:flex;align-items:center;justify-content:space-between;background:var(--glass-nav);backdrop-filter:blur(14px);border-bottom:1px solid var(--glass-border);}
        .nav-brand{font-size:1.6rem;font-weight:700;color:var(--text-white);text-decoration:none;display:flex;align-items:center;gap:0.5rem;}
        .nav-brand span{color:var(--yellow);}
        .nav-link-btn{display:flex;align-items:center;gap:0.4rem;color:var(--text-light);text-decoration:none;font-size:0.82rem;font-weight:500;padding:0.45rem 0.9rem;border-radius:6px;border:1px solid var(--glass-border);transition:all 0.2s;}
        .nav-link-btn:hover{color:white;background:rgba(255,255,255,0.1);}
        .alert-stack{position:fixed;top:5rem;right:1.5rem;z-index:200;display:flex;flex-direction:column;gap:0.5rem;}
        .alert{padding:0.875rem 1.25rem;background:rgba(10,12,30,0.88);backdrop-filter:blur(16px);border:1px solid;border-radius:10px;display:flex;align-items:center;gap:0.625rem;font-size:0.825rem;min-width:260px;animation:slideIn 0.3s ease both;}
        .alert-success{border-color:rgba(245,168,0,0.45);color:var(--yellow);}
        .alert-danger{border-color:rgba(255,100,80,0.45);color:#ff8060;}
        .alert-close{margin-left:auto;background:none;border:none;color:inherit;cursor:pointer;opacity:0.6;font-size:1rem;}
        .page{flex:1;display:flex;align-items:center;justify-content:center;padding:6rem 1.5rem 3rem;}
        .form-card{background:var(--glass-card);backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:20px;padding:2.5rem;width:100%;max-width:440px;box-shadow:0 40px 100px rgba(0,0,0,0.4);animation:fadeUp 0.5s ease both;}
        .card-top{text-align:center;margin-bottom:2rem;}
        .card-icon{width:64px;height:64px;background:rgba(245,168,0,0.15);border:2px solid rgba(245,168,0,0.3);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.6rem;margin:0 auto 1.1rem;}
        .card-top h1{font-size:1.4rem;font-weight:700;margin-bottom:0.3rem;}
        .card-top h1 span{color:var(--yellow);}
        .card-top p{font-size:0.78rem;color:var(--text-dim);}
        .role-badge{display:inline-flex;align-items:center;gap:0.4rem;padding:0.25rem 0.75rem;background:rgba(245,168,0,0.12);border:1px solid rgba(245,168,0,0.3);border-radius:20px;font-size:0.72rem;font-weight:600;color:var(--yellow);margin-bottom:0.75rem;}
        .form-group{margin-bottom:1.2rem;}
        .form-label{display:block;font-size:0.72rem;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.4rem;}
        .input-wrapper{position:relative;}
        .input-icon{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--text-dim);font-size:0.875rem;transition:color 0.3s;pointer-events:none;}
        .input-wrapper:focus-within .input-icon{color:var(--yellow);}
        .form-control{width:100%;background:rgba(255,255,255,0.06);border:1px solid var(--glass-border);border-radius:12px;padding:0.8rem 1rem 0.8rem 2.75rem;color:white;font-family:'Poppins',sans-serif;font-size:0.875rem;transition:all 0.3s;outline:none;}
        .form-control::placeholder{color:var(--text-dim);}
        .form-control:focus{background:rgba(255,255,255,0.10);border-color:var(--yellow);box-shadow:0 0 0 3px rgba(245,168,0,0.12);}
        .btn-submit{width:100%;background:var(--yellow);color:#1a1000;border:none;border-radius:12px;padding:0.95rem;font-family:'Poppins',sans-serif;font-size:0.9rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;transition:all 0.3s;box-shadow:0 8px 24px rgba(245,168,0,0.25);display:flex;align-items:center;justify-content:center;gap:0.5rem;}
        .btn-submit:hover{background:var(--yellow-d);transform:translateY(-2px);}
        .divider{display:flex;align-items:center;gap:0.75rem;margin:1.25rem 0;color:var(--text-dim);font-size:0.75rem;}
        .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--glass-border);}
        .btn-register{width:100%;background:transparent;color:var(--yellow);border:1px solid rgba(245,168,0,0.4);border-radius:12px;padding:0.8rem;font-family:'Poppins',sans-serif;font-size:0.88rem;font-weight:600;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:0.5rem;text-decoration:none;}
        .btn-register:hover{background:rgba(245,168,0,0.1);}
        footer{background:rgba(0,0,0,0.5);backdrop-filter:blur(16px);border-top:1px solid var(--glass-border);padding:1.25rem 3rem;display:flex;align-items:center;justify-content:space-between;}
        .footer-brand{font-size:1.1rem;font-weight:700;color:white;}
        .footer-brand span{color:var(--yellow);}
        .footer-copy{font-size:0.72rem;color:var(--text-dim);}
        @keyframes fadeUp{from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:translateY(0);}}
        @keyframes slideIn{from{opacity:0;transform:translateX(14px);}to{opacity:1;transform:translateX(0);}}
        @media(max-width:500px){nav{padding:0.875rem 1.25rem;}.form-card{padding:1.75rem 1.25rem;}}
    </style>
</head>
<body>
<div class="bg-layer"></div>

<div class="alert-stack">
    <div th:if="${session.success != null}" class="alert alert-success">
        <i class="fas fa-check-circle"></i><span th:text="${session.success}"></span>
        <button class="alert-close" onclick="this.parentElement.remove()">×</button>
    </div>
    <div th:if="${session.failure != null}" class="alert alert-danger">
        <i class="fas fa-exclamation-circle"></i><span th:text="${session.failure}"></span>
        <button class="alert-close" onclick="this.parentElement.remove()">×</button>
    </div>
    <th:block th:text="${@messageRemover.remove()}"></th:block>
</div>

<nav>
    <a class="nav-brand" href="/"><i class="fas fa-shopping-cart" style="font-size:1.1rem;"></i><span>Ekart</span></a>
    <a href="/customer/login" class="nav-link-btn"><i class="fas fa-user"></i> Customer Login</a>
</nav>

<main class="page">
    <div class="form-card">
        <div class="card-top">
            <div class="card-icon"><i class="fas fa-motorcycle" style="color:var(--yellow);"></i></div>
            <div class="role-badge"><i class="fas fa-truck"></i>&nbsp; Delivery Portal</div>
            <h1>Welcome to <span>Ekart</span></h1>
            <p>Sign in to your delivery account</p>
        </div>

        <form method="post" th:action="@{/delivery/login}">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" name="email" class="form-control" placeholder="your@email.com" required/>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" name="password" class="form-control" placeholder="Your password" required/>
                </div>
            </div>
            <button type="submit" class="btn-submit">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>

        <div class="divider">or</div>

        <a href="/delivery/register" class="btn-register">
            <i class="fas fa-user-plus"></i> Register as Delivery Partner
        </a>
    </div>
</main>

<footer>
    <div class="footer-brand"><span>Ekart</span></div>
    <div class="footer-copy">&#169; 2026 Ekart. All rights reserved.</div>
</footer>

<script>
    setTimeout(() => {
        document.querySelectorAll('.alert-stack .alert').forEach(el => {
            el.style.transition='opacity 0.5s'; el.style.opacity='0';
            setTimeout(()=>el.remove(),500);
        });
    }, 2500);
</script>
</body>
</html>
