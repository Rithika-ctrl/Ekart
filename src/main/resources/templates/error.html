<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekart - Something Went Wrong</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 576 512'%3E%3Cpath fill='%23f5a800' d='M528.12 301.319l47.273-208C578.806 78.301 567.391 64 551.99 64H159.208l-9.166-44.81C147.758 8.021 137.93 0 126.529 0H24C10.745 0 0 10.745 0 24v16c0 13.255 10.745 24 24 24h69.883l70.248 343.435C147.325 417.1 136 435.222 136 456c0 30.928 25.072 56 56 56s56-25.072 56-56c0-15.674-6.447-29.835-16.824-40h209.647C430.447 426.165 424 440.326 424 456c0 30.928 25.072 56 56 56s56-25.072 56-56c0-22.172-12.888-41.332-31.579-50.405l5.517-24.276c3.413-15.018-8.002-29.319-23.403-29.319H218.117l-6.545-32h293.145c11.206 0 20.92-7.754 23.403-18.681z'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --yellow:       #f5a800;
            --yellow-d:     #d48f00;
            --glass-border: rgba(255, 255, 255, 0.22);
            --glass-card:   rgba(255, 255, 255, 0.13);
            --glass-nav:    rgba(0, 0, 0, 0.25);
            --text-white:   #ffffff;
            --text-light:   rgba(255,255,255,0.80);
            --text-dim:     rgba(255,255,255,0.50);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            color: var(--text-white);
            display: flex;
            flex-direction: column;
        }

        /* ── BACKGROUND ── */
        .bg-layer { position: fixed; inset: 0; z-index: -1; overflow: hidden; }
        .bg-layer::before {
            content: '';
            position: absolute; inset: -20px;
            background: url('https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?w=1600&q=80') center/cover no-repeat;
            filter: blur(6px); transform: scale(1.08);
        }
        .bg-layer::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(180deg, rgba(5,8,20,0.82) 0%, rgba(8,12,28,0.78) 40%, rgba(5,8,20,0.88) 100%);
        }

        /* ── NAV ── */
        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            padding: 1rem 3rem;
            display: flex; align-items: center; justify-content: space-between;
            background: var(--glass-nav);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--glass-border);
        }
        .nav-brand {
            font-size: 1.6rem; font-weight: 700;
            color: var(--text-white); text-decoration: none;
            letter-spacing: 0.04em;
            display: flex; align-items: center; gap: 0.5rem;
        }
        .nav-brand span { color: var(--yellow); }

        /* ── PAGE CENTER ── */
        .page-center {
            flex: 1;
            display: flex; align-items: center; justify-content: center;
            padding: 7rem 1.5rem 3rem;
        }

        /* ── ERROR CARD ── */
        .error-card {
            background: var(--glass-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3.5rem 3rem;
            width: 100%; max-width: 520px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            animation: fadeUp 0.6s cubic-bezier(0.23,1,0.32,1) both;
        }

        /* ── PULSING ICON ── */
        .error-icon-wrap {
            width: 88px; height: 88px;
            margin: 0 auto 2rem;
            position: relative;
        }
        .error-icon-ring {
            position: absolute; inset: 0; border-radius: 50%;
            border: 2px solid rgba(255,100,80,0.3);
            animation: pulse-ring 2s ease-out infinite;
        }
        .error-icon-ring:nth-child(2) { animation-delay: 0.5s; }
        .error-icon-core {
            position: absolute; inset: 12px;
            background: rgba(255,100,80,0.12);
            border: 2px solid rgba(255,100,80,0.4);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.75rem; color: #ff8060;
        }

        @keyframes pulse-ring {
            0%   { transform: scale(1);   opacity: 0.6; }
            100% { transform: scale(1.55); opacity: 0; }
        }

        .error-title {
            font-size: 1.45rem; font-weight: 700;
            color: white; margin-bottom: 0.65rem;
        }
        .error-message {
            font-size: 0.845rem; color: var(--text-dim);
            line-height: 1.7; margin-bottom: 2rem;
        }

        /* ── DEBUG BOX ── */
        .debug-box {
            background: rgba(255,80,60,0.07);
            border: 1px solid rgba(255,80,60,0.25);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            margin-bottom: 1.75rem;
            text-align: left;
        }
        .debug-label {
            font-size: 0.65rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.1em;
            color: rgba(255,100,80,0.7); margin-bottom: 0.4rem;
            display: flex; align-items: center; gap: 0.35rem;
        }
        .debug-text {
            font-size: 0.775rem; color: var(--text-dim);
            font-family: monospace; word-break: break-all; line-height: 1.6;
        }

        /* ── DIVIDER ── */
        .divider { border: none; border-top: 1px solid var(--glass-border); margin: 0 0 2rem; }

        /* ── BUTTONS ── */
        .btn-actions { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }

        .btn-back {
            display: inline-flex; align-items: center; gap: 0.5rem;
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-light);
            padding: 0.8rem 1.5rem; border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.875rem; font-weight: 600;
            text-decoration: none; cursor: pointer;
            transition: all 0.25s;
        }
        .btn-back:hover { background: rgba(255,255,255,0.08); color: white; border-color: rgba(255,255,255,0.35); }

        .btn-home {
            display: inline-flex; align-items: center; gap: 0.5rem;
            background: var(--yellow); color: #1a1000;
            border: none; border-radius: 12px;
            padding: 0.8rem 2rem;
            font-family: 'Poppins', sans-serif;
            font-size: 0.875rem; font-weight: 700;
            letter-spacing: 0.06em; text-transform: uppercase;
            text-decoration: none; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.23,1,0.32,1);
            box-shadow: 0 8px 24px rgba(245,168,0,0.25);
        }
        .btn-home:hover {
            background: var(--yellow-d); color: #1a1000;
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(245,168,0,0.42);
        }

        /* ── FOOTER ── */
        footer {
            background: rgba(0,0,0,0.5); backdrop-filter: blur(16px);
            border-top: 1px solid var(--glass-border);
            padding: 1.25rem 3rem;
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 0.75rem;
        }
        .footer-brand { font-size: 1.1rem; font-weight: 700; color: white; }
        .footer-brand span { color: var(--yellow); }
        .footer-copy { font-size: 0.72rem; color: var(--text-dim); }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media(max-width: 600px) {
            nav { padding: 0.875rem 1.25rem; }
            .error-card { padding: 2.5rem 1.5rem; }
            footer { padding: 1.25rem; flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

<div class="bg-layer"></div>

<nav>
    <a href="/" class="nav-brand">
        <i class="fas fa-shopping-cart" style="font-size:1.1rem;"></i>
        <span>Ekart</span>
    </a>
</nav>

<main class="page-center">
    <div class="error-card">

        <!-- Animated icon -->
        <div class="error-icon-wrap">
            <div class="error-icon-ring"></div>
            <div class="error-icon-ring"></div>
            <div class="error-icon-core">
                <i class="fas fa-exclamation"></i>
            </div>
        </div>

        <h1 class="error-title">Oops! Something went wrong</h1>
        <p class="error-message">The page could not be processed. Please go back or return to the home page and try again.</p>

        <!-- Debug info box — only shown when errorMessage is present -->
        <div class="debug-box" th:if="${errorMessage}">
            <div class="debug-label"><i class="fas fa-bug"></i> Debug Info</div>
            <div class="debug-text" th:text="${errorMessage}"></div>
        </div>

        <hr class="divider">

        <div class="btn-actions">
            <a href="javascript:history.back()" class="btn-back">
                <i class="fas fa-arrow-left"></i> Go Back
            </a>
            <a href="/" class="btn-home">
                <i class="fas fa-house"></i> Go to Home
            </a>
        </div>

    </div>
</main>

<footer>
    <div class="footer-brand"><span>Ekart</span></div>
    <div class="footer-copy">© 2026 Ekart. All rights reserved.</div>
</footer>

</body>
</html>
