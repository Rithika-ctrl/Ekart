<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Reset Password - Ekart</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            flex: 1;
        }

        footer {
            background: linear-gradient(135deg, #1e40af, #2563eb);
            color: white;
            padding: 1.25rem 0;
            box-shadow: 0 -4px 6px -1px rgba(0, 0, 0, 0.1);
        }
    </style>
    <link rel="stylesheet" href="/css/common-layout.css">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body p-4">
                        <h4 class="text-center mb-4">Customer Reset Password</h4>

                        <div class="alert alert-success" th:if="${session.success}" th:text="${session.success}"></div>
                        <div class="alert alert-danger" th:if="${session.failure}" th:text="${session.failure}"></div>
                        <th:block th:text="${@messageRemover.remove()}"></th:block>

                        <form action="/customer/reset-password" method="post">
                            <input type="hidden" name="id" th:value="${id}">
                            <div class="form-group">
                                <label for="otp">OTP</label>
                                <input type="number" id="otp" name="otp" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label for="password">New Password</label>
                                <input type="password" id="password" name="password" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label for="confirmPassword">Confirm Password</label>
                                <input type="password" id="confirmPassword" name="confirmPassword" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-primary btn-block">Reset Password</button>
                        </form>

                        <div class="text-center mt-3">
                            <a href="/customer/login">Back to Login</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center mt-auto">
        <div>&copy; 2026 Ekart. All rights reserved. | <i class="fas fa-heart text-danger"></i> Made with passion</div>
    </footer>
</body>

</html>
