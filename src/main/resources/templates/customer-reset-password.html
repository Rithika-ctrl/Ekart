<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekart - Secure Reset</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --yellow:       #f5a800;
            --yellow-d:     #d48f00;
            --glass-border: rgba(255, 255, 255, 0.22);
            --glass-card:   rgba(255, 255, 255, 0.13);
            --glass-nav:    rgba(0, 0, 0, 0.25);
            --text-white:   #ffffff;
            --text-light:   rgba(255,255,255,0.80);
            --text-dim:     rgba(255,255,255,0.50);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            color: var(--text-white);
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* ── BACKGROUND ── */
        .bg-layer {
            position: fixed; inset: 0; z-index: -1;
            overflow: hidden;
        }
        .bg-layer::before {
            content: '';
            position: absolute; inset: -20px;
            background: url('https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?w=1600&q=80') center/cover no-repeat;
            filter: blur(8px);
            transform: scale(1.1);
        }
        .bg-layer::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(
                180deg,
                rgba(5, 8, 20, 0.85) 0%,
                rgba(8, 12, 28, 0.80) 40%,
                rgba(5, 8, 20, 0.92) 100%
            );
        }

        /* ── NAV ── */
        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            padding: 1.25rem 3rem;
            display: flex; align-items: center; justify-content: space-between;
            background: var(--glass-nav);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--glass-border);
        }
        .nav-brand {
            font-size: 1.6rem; font-weight: 700;
            color: #ffffff; text-decoration: none;
            letter-spacing: 0.04em;
            display: flex; align-items: center; gap: 0.5rem;
        

}
        .nav-brand span { color: #f5a800; 

}

        /* ── RESET CARD ── */
        .page-center {
            flex: 1;
            display: flex; align-items: center; justify-content: center;
            padding: 6rem 1.5rem 3rem;
        }

        .auth-card {
            background: var(--glass-card);
            backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            animation: fadeUp 0.6s cubic-bezier(0.23, 1, 0.32, 1) both;
        }

        .auth-header { text-align: center; margin-bottom: 2.5rem; }
        .auth-header i { 
            font-size: 2.5rem; color: var(--yellow); 
            margin-bottom: 1rem; opacity: 0.9;
        }
        .auth-header h2 { font-size: 1.5rem; font-weight: 700; letter-spacing: 0.02em; }
        .auth-header p { font-size: 0.825rem; color: var(--text-dim); margin-top: 0.5rem; }

        /* ── FORM ── */
        .form-group { margin-bottom: 1.5rem; }
        .form-group label {
            display: block; font-size: 0.75rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.1em;
            color: var(--text-dim); margin-bottom: 0.6rem; margin-left: 0.2rem;
        }
        .input-wrapper { position: relative; }
        .input-wrapper i {
            position: absolute; left: 1rem; top: 50%;
            transform: translateY(-50%); color: var(--text-dim);
            font-size: 0.9rem;
        }
        .form-control {
            width: 100%;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 0.8rem 1rem 0.8rem 2.8rem;
            color: white; font-family: 'Poppins', sans-serif;
            font-size: 0.9rem; transition: all 0.3s;
        }
        .form-control:focus {
            outline: none; background: rgba(255,255,255,0.1);
            border-color: var(--yellow);
            box-shadow: 0 0 15px rgba(245,168,0,0.2);
        }

        .btn-submit {
            width: 100%;
            background: var(--yellow); color: #1a1000;
            border: none; border-radius: 12px;
            padding: 0.9rem; margin-top: 1rem;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem; font-weight: 700;
            letter-spacing: 0.05em; text-transform: uppercase;
            cursor: pointer; transition: all 0.3s;
            box-shadow: 0 8px 24px rgba(245,168,0,0.25);
        }
        .btn-submit:hover {
            background: var(--yellow-d); transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(245,168,0,0.4);
        }

        .back-link {
            display: block; text-align: center; margin-top: 1.5rem;
            color: var(--text-dim); text-decoration: none;
            font-size: 0.8rem; transition: color 0.2s;
        }
        .back-link:hover { color: var(--text-white); }

        /* ── ALERTS ── */
        .alert {
            padding: 0.8rem 1.2rem; border-radius: 12px;
            font-size: 0.8rem; margin-bottom: 1.5rem;
            display: flex; align-items: center; gap: 0.6rem;
            animation: slideIn 0.4s ease both;
        }
        .alert-success { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: #4ade80; }
        .alert-danger { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #f87171; }

        @keyframes fadeUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
        @keyframes slideIn { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }

        footer {
            background: rgba(0,0,0,0.4); backdrop-filter: blur(10px);
            padding: 1.5rem; text-align: center;
            border-top: 1px solid var(--glass-border);
            font-size: 0.75rem; color: var(--text-dim);
        }
        footer span { color: var(--yellow); }

        @media(max-width: 600px) {
            nav { padding: 1rem 1.5rem; }
            .auth-card { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>

<div class="bg-layer"></div>

<nav>
    <a href="/" class="nav-brand"><span>E</span>Kart</a>
</nav>

<main class="page-center">
    <div class="auth-card">
        <div class="auth-header">
            <i class="fas fa-shield-alt"></i>
            <h2>Security Reset</h2>
            <p>Please enter your OTP and choose a strong new password.</p>
        </div>

        <div class="alert alert-success" th:if="${session.success}">
            <i class="fas fa-check-circle"></i> <span th:text="${session.success}"></span>
        </div>
        <div class="alert alert-danger" th:if="${session.failure}">
            <i class="fas fa-exclamation-circle"></i> <span th:text="${session.failure}"></span>
        </div>
        <th:block th:text="${@messageRemover.remove()}"></th:block>

        <form action="/customer/reset-password" method="post">
            <input type="hidden" name="id" th:value="${id}">

            <div class="form-group">
                <label for="otp">Verification Code</label>
                <div class="input-wrapper">
                    <i class="fas fa-key"></i>
                    <input type="number" id="otp" name="otp" class="form-control" placeholder="Enter OTP" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">New Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-check-double"></i>
                    <input type="password" id="confirmPassword" name="confirmPassword" class="form-control" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn-submit">Update Password</button>
        </form>

        <a href="/customer/login" class="back-link">
            <i class="fas fa-arrow-left mr-2"></i> Return to Login
        </a>
    </div>
</main>

<footer>
    © 2026 <span>Ekart</span>. All rights reserved. | <i class="fas fa-heart" style="color:#ff8060"></i> Secure Platform
</footer>



</body>
</html>
