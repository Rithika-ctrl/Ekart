<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekart - Approve Products</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 576 512'%3E%3Cpath fill='%23f5a800' d='M528.12 301.319l47.273-208C578.806 78.301 567.391 64 551.99 64H159.208l-9.166-44.81C147.758 8.021 137.93 0 126.529 0H24C10.745 0 0 10.745 0 24v16c0 13.255 10.745 24 24 24h69.883l70.248 343.435C147.325 417.1 136 435.222 136 456c0 30.928 25.072 56 56 56s56-25.072 56-56c0-15.674-6.447-29.835-16.824-40h209.647C430.447 426.165 424 440.326 424 456c0 30.928 25.072 56 56 56s56-25.072 56-56c0-22.172-12.888-41.332-31.579-50.405l5.517-24.276c3.413-15.018-8.002-29.319-23.403-29.319H218.117l-6.545-32h293.145c11.206 0 20.92-7.754 23.403-18.681z'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --yellow:       #f5a800;
            --yellow-d:     #d48f00;
            --glass-border: rgba(255, 255, 255, 0.22);
            --glass-card:   rgba(255,255,255,0.88);
            --glass-nav:    rgba(255,255,255,0.85);
            --text-white:   #0f172a;
            --text-light:   rgba(255,255,255,0.80);
            --text-dim:     rgba(255,255,255,0.50);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            color: #0f172a;
            display: flex;
            flex-direction: column;
        }

        /* ── BACKGROUND ── */
        .bg-layer { position: fixed; inset: 0; z-index: -1; overflow: hidden; }
        .bg-layer::before {
            content: '';
            position: absolute; inset: 0;
            background: url('/css/ekart-bg.svg') center/cover no-repeat;
             
        }
        .bg-layer::after {
            content: '';
            position: absolute; inset: 0;
            background: rgba(255,255,255,0.10);
        }

        /* ── NAV ── */
        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            padding: 1rem 3rem;
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            transition: background 0.3s;
        }
        nav.scrolled { background: rgba(0,0,0,0.45); }

        .nav-brand {
            font-size: 1.6rem; font-weight: 700;
            color: #0f172a; text-decoration: none;
            letter-spacing: 0.04em;
            display: flex; align-items: center; gap: 0.5rem;
        }
        .nav-brand span { color: var(--yellow); }

        .nav-right { display: flex; align-items: center; gap: 1rem; }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-link {
            display: flex; align-items: center; gap: 0.4rem;
            color: #334155; text-decoration: none;
            font-size: 0.82rem; font-weight: 500;
            padding: 0.45rem 0.9rem; border-radius: 6px;
            border: 1px solid transparent;
            transition: all 0.2s;
        }
        .nav-link:hover { 
            color: var(--yellow); 
            border-color: rgba(245,168,0,0.3); 
            background: rgba(245,168,0,0.08); 
        }
        .nav-link.active {
            color: var(--yellow);
            background: rgba(245,168,0,0.12);
            border-color: rgba(245,168,0,0.4);
        }

        .nav-divider {
            width: 1px;
            height: 24px;
            background: rgba(255,255,255,0.15);
            margin: 0 0.5rem;
        }

        .nav-badge {
            display: flex; align-items: center; gap: 0.4rem;
            font-size: 0.72rem; font-weight: 700;
            padding: 0.3rem 0.8rem; border-radius: 50px;
            background: rgba(245,168,0,0.15);
            border: 1px solid rgba(245,168,0,0.3);
            color: var(--yellow);
            letter-spacing: 0.06em; text-transform: uppercase;
        }
        .btn-logout {
            display: flex; align-items: center; gap: 0.4rem;
            color: #334155; text-decoration: none;
            font-size: 0.82rem; font-weight: 500;
            padding: 0.45rem 0.9rem; border-radius: 6px;
            border: 1px solid rgba(255,100,80,0.3);
            transition: all 0.2s;
        }
        .btn-logout:hover { color: #ff8060; border-color: rgba(255,100,80,0.6); background: rgba(255,100,80,0.08); }

        /* ── ALERTS ── */
        .alert-stack {
            position: fixed; top: 5rem; right: 1.5rem;
            z-index: 200; display: flex; flex-direction: column; gap: 0.5rem;
        }
        .alert {
            padding: 0.875rem 1.25rem;
            background: rgba(255,255,255,0.97);            backdrop-filter: blur(12px);
            border: 1px solid; border-radius: 10px;
            display: flex; align-items: center; gap: 0.625rem;
            font-size: 0.825rem; min-width: 260px;
            animation: slideIn 0.3s ease both;
        }
        .alert-success { border-color: rgba(34,197,94,0.45); color: #22c55e; }
        .alert-danger  { border-color: rgba(255,100,80,0.45); color: #ff8060; }
        .alert-close { margin-left: auto; background: none; border: none; color: inherit; cursor: pointer; opacity: 0.6; font-size: 1rem; }

        /* ── PAGE ── */
        .page {
            flex: 1;
            padding: 7rem 3rem 3rem;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        /* ── PAGE HEADER ── */
        .page-header {
            background: var(--glass-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem 2.5rem;
            display: flex; align-items: center; justify-content: space-between;
            gap: 1.5rem; flex-wrap: wrap;
            animation: fadeUp 0.5s ease both;
        }
        .page-header-left h1 {
            font-size: clamp(1.2rem, 2.5vw, 1.75rem);
            font-weight: 700; margin-bottom: 0.25rem;
        }
        .page-header-left h1 span { color: var(--yellow); }
        .page-header-left p { font-size: 0.825rem; color: #64748b; }
        .page-header-icon {
            width: 60px; height: 60px;
            background: rgba(245,168,0,0.15);
            border: 2px solid rgba(245,168,0,0.3);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; flex-shrink: 0;
        }

        /* ── PRODUCT GRID ── */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.75rem;
        }

        /* ── PRODUCT CARD ── */
        .product-card {
            background: var(--glass-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.23,1,0.32,1);
            animation: fadeUp 0.6s ease both;
            position: relative;
        }
        .product-card:nth-child(1) { animation-delay: 0.05s; }
        .product-card:nth-child(2) { animation-delay: 0.10s; }
        .product-card:nth-child(3) { animation-delay: 0.15s; }
        .product-card:nth-child(4) { animation-delay: 0.20s; }
        .product-card:nth-child(5) { animation-delay: 0.25s; }
        .product-card:nth-child(6) { animation-delay: 0.30s; }

        .product-card:hover {
            transform: translateY(-8px);
            border-color: rgba(245,168,0,0.4);
            box-shadow: 0 24px 55px rgba(0,0,0,0.35);
        }

        /* ── STATUS RIBBON ── */
        .status-ribbon {
            position: absolute; top: 14px; left: 14px;
            display: inline-flex; align-items: center; gap: 0.3rem;
            padding: 4px 12px; border-radius: 50px;
            font-size: 0.65rem; font-weight: 800;
            text-transform: uppercase; letter-spacing: 0.07em;
            z-index: 5;
        }
        .ribbon-approved {
            background: rgba(34,197,94,0.25);
            border: 1px solid rgba(34,197,94,0.45);
            color: #4ade80;
        }
        .ribbon-pending {
            background: rgba(245,168,0,0.2);
            border: 1px solid rgba(245,168,0,0.4);
            color: var(--yellow);
        }

        /* ── IMAGE ── */
        .img-area { position: relative; height: 210px; overflow: hidden; flex-shrink: 0; }
        .card-image {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.5s;
        }
        .product-card:hover .card-image {  }

        /* ── CARD BODY ── */
        .card-body {
            padding: 1.4rem;
            display: flex; flex-direction: column;
            gap: 0.6rem; flex: 1;
        }

        .category-pill {
            display: inline-flex; align-items: center; gap: 0.3rem;
            background: rgba(245,168,0,0.12);
            border: 1px solid rgba(245,168,0,0.25);
            color: var(--yellow);
            font-size: 0.65rem; font-weight: 700;
            padding: 3px 10px; border-radius: 20px;
            text-transform: uppercase; letter-spacing: 0.06em;
            width: fit-content;
        }

        .product-name {
            font-size: 1rem; font-weight: 700; color: #0f172a; line-height: 1.3;
        }
        .product-description {
            font-size: 0.775rem; color: #64748b; line-height: 1.55;
        }

        .meta-row {
            display: flex; gap: 1.25rem; flex-wrap: wrap;
        }
        .meta-item { font-size: 0.775rem; }
        .meta-item .meta-label { font-weight: 700; color: var(--yellow); margin-right: 0.3rem; }
        .meta-item .meta-val   { color: #334155; }

        .price-tag {
            font-size: 1.5rem; font-weight: 800; color: var(--yellow);
        }
        .price-tag sup { font-size: 0.85rem; vertical-align: super; font-weight: 700; }

        /* ── CARD DIVIDER ── */
        .card-divider { border: none; border-top: 1px solid var(--glass-border); margin: 0.25rem 0; }

        /* ── ACTION BUTTONS ── */
        .card-actions { display: flex; gap: 0.75rem; margin-top: auto; }

        .btn-approve {
            flex: 1;
            display: flex; align-items: center; justify-content: center; gap: 0.45rem;
            background: var(--yellow); color: #1a1000;
            border: none; border-radius: 12px;
            padding: 0.8rem;
            font-family: 'Poppins', sans-serif;
            font-size: 0.78rem; font-weight: 700;
            letter-spacing: 0.06em; text-transform: uppercase;
            text-decoration: none;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.23,1,0.32,1);
            box-shadow: 0 5px 18px rgba(245,168,0,0.25);
        }
        .btn-approve:hover {
            background: var(--yellow-d); color: #1a1000;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(245,168,0,0.4);
        }

        .btn-hide {
            flex: 1;
            display: flex; align-items: center; justify-content: center; gap: 0.45rem;
            background: rgba(255,100,80,0.12);
            border: 1px solid rgba(255,100,80,0.35);
            color: #ff8060;
            border-radius: 12px; padding: 0.8rem;
            font-family: 'Poppins', sans-serif;
            font-size: 0.78rem; font-weight: 700;
            letter-spacing: 0.06em; text-transform: uppercase;
            text-decoration: none;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.23,1,0.32,1);
        }
        .btn-hide:hover {
            background: rgba(255,100,80,0.22);
            border-color: rgba(255,100,80,0.6);
            color: #ff8060;
            transform: translateY(-2px);
        }

        /* ── EMPTY STATE ── */
        .empty-state {
            background: var(--glass-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 5rem 2rem;
            text-align: center;
            color: #64748b;
        }
        .empty-state i { font-size: 3rem; margin-bottom: 1.25rem; display: block; opacity: 0.4; }
        .empty-state p { font-size: 0.9rem; }

        /* ── BACK BUTTON ── */
        .page-footer {
            display: flex; justify-content: center;
            padding-top: 0.5rem;
        }
        .btn-back {
            display: inline-flex; align-items: center; gap: 0.5rem;
            background: transparent;
            border: 1px solid var(--glass-border);
            color: #334155;
            padding: 0.75rem 2rem; border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem; font-weight: 600;
            text-decoration: none;
            transition: all 0.25s;
        }
        .btn-back:hover { background: rgba(255,255,255,0.08); color: #0f172a; border-color: rgba(255,255,255,0.35); }

        /* ── FOOTER ── */
        footer {
            background: rgba(255,255,255,0.80);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--glass-border);
            padding: 1.25rem 3rem;
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 0.75rem;
        }
        .footer-brand { font-size: 1.1rem; font-weight: 700; color: #0f172a; }
        .footer-brand span { color: var(--yellow); }
        .footer-copy { font-size: 0.72rem; color: #64748b; }

        /* ── ANIMATIONS ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(22px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(14px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        /* ── RESPONSIVE ── */
        @media(max-width: 1024px) {
            .nav-links { display: none; }
            .nav-divider { display: none; }
        }
        @media(max-width: 900px) {
            nav { padding: 0.875rem 1.25rem; }
            .page { padding: 5.5rem 1.25rem 2rem; }
            .page-header { flex-direction: column; text-align: center; }
            footer { padding: 1.25rem; flex-direction: column; text-align: center; }
        }
        @media(max-width: 560px) {
            .product-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="bg-layer"></div>

<!-- ── FLOATING ALERTS ── -->
<div class="alert-stack">
    <div class="alert alert-success" th:if="${session.success}">
        <i class="fas fa-check-circle"></i>
        <span th:text="${session.success}"></span>
        <button class="alert-close" onclick="this.parentElement.remove()">×</button>
    </div>
    <div class="alert alert-danger" th:if="${session.failure}">
        <i class="fas fa-exclamation-circle"></i>
        <span th:text="${session.failure}"></span>
        <button class="alert-close" onclick="this.parentElement.remove()">×</button>
    </div>
    <th:block th:text="${@messageRemover.remove()}"></th:block>
</div>

<!-- ── NAV ── -->
<nav id="nav">
    <a href="/admin/home" class="nav-brand">
        <i class="fas fa-shopping-cart" style="font-size:1.1rem;"></i>
        Ekart
    </a>
    <div class="nav-right">
        <div class="nav-links">
            <a href="/admin/home" class="nav-link"><i class="fas fa-home"></i> Dashboard</a>
            <a href="/approve-products" class="nav-link active"><i class="fas fa-tasks"></i> Approvals</a>
            <a href="/admin/search-users" class="nav-link"><i class="fas fa-users"></i> Users</a>
        </div>
        <div class="nav-divider"></div>
        <span class="nav-badge"><i class="fas fa-shield-alt"></i> Admin</span>
        <a href="/admin/logout" class="btn-logout">
            <i class="fas fa-sign-out-alt"></i> Logout
        </a>
    </div>
</nav>

<!-- ── PAGE ── -->
<main class="page">

    <!-- Page Header -->
    <div class="page-header">
        <div class="page-header-left">
            <h1>Approve <span>Products</span> 📋</h1>
            <p>Review pending vendor listings and approve or hide them from the storefront.</p>
        </div>
        <div class="page-header-icon">✅</div>
    </div>

    <!-- Product Grid -->
    <div class="product-grid" th:if="${products != null and !products.isEmpty()}">
        <div th:each="p : ${products}" class="product-card">

            <!-- Status Ribbon -->
            <div th:if="${p.approved}" class="status-ribbon ribbon-approved">
                <i class="fas fa-check-circle"></i> Approved
            </div>
            <div th:if="${!p.approved}" class="status-ribbon ribbon-pending">
                <i class="fas fa-clock"></i> Pending
            </div>

            <!-- Image -->
            <div class="img-area">
                <img class="card-image" th:src="${p.imageLink}" alt="">
            </div>

            <!-- Body -->
            <div class="card-body">

                <span class="category-pill" th:text="${p.category}"></span>
                <div class="product-name" th:text="${p.name}"></div>
                <div class="product-description" th:text="${p.description}"></div>

                <div class="meta-row">
                    <div class="meta-item">
                        <span class="meta-label">Stock:</span>
                        <span class="meta-val" th:text="${p.stock} + ' units'"></span>
                    </div>
                </div>

                <div class="price-tag"><sup>₹</sup><span th:text="${p.price}"></span></div>

                <hr class="card-divider">

                <!-- Actions -->
                <div class="card-actions">
                    <a th:if="${!p.approved}" th:href="'/change/' + ${p.id}" class="btn-approve">
                        <i class="fas fa-check"></i> Approve
                    </a>
                    <a th:if="${p.approved}" th:href="'/change/' + ${p.id}" class="btn-hide">
                        <i class="fas fa-eye-slash"></i> Hide
                    </a>
                </div>

            </div>
        </div>
    </div>

    <!-- Empty State -->
    <div class="empty-state" th:if="${products == null or products.isEmpty()}">
        <i class="fas fa-box-open"></i>
        <p>No products pending review right now.</p>
    </div>

    <!-- Back -->
    <div class="page-footer">
        <a href="/admin/home" class="btn-back">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>
    </div>

</main>

<!-- ── FOOTER ── -->
<footer>
    <div class="footer-brand">Ekart</div>
    <div class="footer-copy">© 2026 Ekart. All rights reserved.</div>
</footer>

<script>
    window.addEventListener('scroll', () => {
        document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 10);
    });

    setTimeout(() => {
        document.querySelectorAll('.alert-stack .alert').forEach(el => {
            el.style.transition = 'opacity 0.5s';
            el.style.opacity = '0';
            setTimeout(() => el.remove(), 500);
        });
    }, 2500);
</script>

</body>
</html>
