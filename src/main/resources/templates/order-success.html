<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Placed - Ekart</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --yellow:       #f5a800;
            --yellow-d:     #d48f00;
            --glass-border: rgba(255,255,255,0.22);
            --glass-card:   rgba(255,255,255,0.13);
            --glass-nav:    rgba(0,0,0,0.25);
            --text-white:   #ffffff;
            --text-light:   rgba(255,255,255,0.80);
            --text-dim:     rgba(255,255,255,0.50);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            color: var(--text-white);
            overflow: hidden;
        }

        /* blurred bg — same as add-product */
        .bg-layer { position: fixed; inset: 0; z-index: -1; overflow: hidden; }
        .bg-layer::before {
            content: '';
            position: absolute; inset: -20px;
            background: url('https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?w=1600&q=80') center/cover no-repeat;
            filter: blur(6px);
            transform: scale(1.08);
        }
        .bg-layer::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(180deg,
                rgba(5,8,20,0.82) 0%,
                rgba(8,12,28,0.78) 40%,
                rgba(5,8,20,0.88) 100%);
        }

        /* ── CARD ── */
        .card {
            background: var(--glass-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            width: 95%; max-width: 500px;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0,0,0,0.4);
            animation: fadeUp 0.5s ease both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(22px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── HEADER ── */
        .card-header {
            padding: 32px 32px 26px;
            text-align: center;
            border-bottom: 1px solid var(--glass-border);
            position: relative; overflow: hidden;
        }
        .card-header::before {
            content: '';
            position: absolute; top: -50px; right: -50px;
            width: 180px; height: 180px;
            background: radial-gradient(circle, rgba(245,168,0,0.12), transparent 70%);
            border-radius: 50%;
        }
        .card-header::after {
            content: '';
            position: absolute; bottom: -40px; left: -40px;
            width: 150px; height: 150px;
            background: radial-gradient(circle, rgba(245,168,0,0.07), transparent 70%);
            border-radius: 50%;
        }

        .header-brand {
            font-size: 12px; font-weight: 700;
            color: var(--text-dim); letter-spacing: 0.1em;
            text-transform: uppercase; margin-bottom: 18px;
            position: relative; z-index: 1;
        }
        .header-brand span { color: var(--yellow); }

        /* status chip */
        .status-chip {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(245,168,0,0.12);
            border: 1px solid rgba(245,168,0,0.3);
            color: var(--yellow);
            font-size: 11px; font-weight: 700;
            padding: 5px 14px; border-radius: 50px;
            text-transform: uppercase; letter-spacing: 0.08em;
            margin-bottom: 18px; position: relative; z-index: 1;
        }
        .status-dot {
            width: 7px; height: 7px;
            background: var(--yellow); border-radius: 50%;
            animation: blink 1.4s ease-in-out infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

        /* icon ring */
        .icon-ring {
            width: 80px; height: 80px; border-radius: 50%;
            background: rgba(245,168,0,0.1);
            border: 2px solid rgba(245,168,0,0.35);
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 2rem; color: var(--yellow);
            margin-bottom: 18px; position: relative; z-index: 1;
            box-shadow: 0 0 40px rgba(245,168,0,0.18);
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,100% { box-shadow: 0 0 40px rgba(245,168,0,0.18); }
            50%      { box-shadow: 0 0 60px rgba(245,168,0,0.32); }
        }

        .card-header h2 {
            font-size: 20px; font-weight: 700;
            color: var(--text-white); letter-spacing: -0.01em;
            margin-bottom: 6px; position: relative; z-index: 1;
        }
        .card-header p {
            font-size: 13px; color: var(--text-dim);
            line-height: 1.6; margin: 0; position: relative; z-index: 1;
        }

        /* ── BODY ── */
        .card-body { padding: 26px 32px 30px; }

        .notice-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px 18px; margin-bottom: 24px;
            font-size: 13px; color: var(--text-dim); line-height: 1.6;
        }
        .notice-box strong { color: var(--text-light); }

        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            padding: 12px 18px; border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 13px; font-weight: 700;
            text-decoration: none; transition: all 0.25s;
            border: none; cursor: pointer;
            letter-spacing: 0.03em;
        }
        .btn-primary {
            background: var(--yellow); color: #1a1000;
            box-shadow: 0 8px 24px rgba(245,168,0,0.25);
        }
        .btn-primary:hover {
            background: var(--yellow-d);
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(245,168,0,0.42);
            color: #1a1000; text-decoration: none;
        }
        .btn-ghost {
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--glass-border);
            color: var(--text-light);
        }
        .btn-ghost:hover {
            background: rgba(255,255,255,0.11);
            border-color: rgba(255,255,255,0.35);
            color: var(--text-white); text-decoration: none;
        }

        /* ── FOOTER ── */
        .card-footer {
            background: rgba(0,0,0,0.25);
            border-top: 1px solid var(--glass-border);
            padding: 14px 32px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .footer-brand { font-size: 12px; font-weight: 700; color: var(--text-dim); }
        .footer-brand span { color: var(--yellow); }
        .footer-copy { font-size: 11px; color: var(--text-dim); opacity: 0.6; }
    </style>
</head>
<body>

<div class="bg-layer"></div>

<div class="card">

    <!-- Header -->
    <div class="card-header">
        <div class="header-brand">E<span>kart</span></div>
        <div class="status-chip">
            <div class="status-dot"></div>
            Confirmed
        </div>
        <div class="icon-ring"><i class="fas fa-check"></i></div>
        <h2>Order Placed Successfully! 🎉</h2>
        <p>Your order has been confirmed and a confirmation<br>mail has been sent to you.</p>
    </div>

    <!-- Body -->
    <div class="card-body">
        <div class="notice-box">
            <strong>What's next?</strong><br>
            We'll notify you once your items are out for delivery. Sit back and relax! 🚗
        </div>
        <div class="actions">
            <a href="/view-orders" class="btn btn-primary">
                <i class="fas fa-truck"></i> Track Orders
            </a>
            <a href="/customer/home" class="btn btn-ghost">
                <i class="fas fa-home"></i> Go to Home
            </a>
        </div>
    </div>

    <!-- Footer -->
    <div class="card-footer">
        <div class="footer-brand">E<span>kart</span></div>
        <div class="footer-copy">&#169; 2026 Ekart. All rights reserved.</div>
    </div>

</div>

</body>
</html>
