<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Placed - Ekart</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8fafc;
            font-family: 'Poppins', sans-serif;
            margin: 0;
        }

        .success-card {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.12);
            text-align: center;
            width: 95%;
            max-width: 560px;
        }

        .success-icon {
            font-size: 3.5rem;
            color: #10b981;
            margin-bottom: 0.75rem;
        }

        .btn-primary-custom {
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 0.7rem 1.3rem;
            font-weight: 600;
            margin: 0.35rem;
            display: inline-block;
            text-decoration: none;
        }

        .btn-primary-custom:hover {
            background: #1e40af;
            color: white;
            text-decoration: none;
        }
    </style>
    <link rel="stylesheet" href="/css/common-layout.css">
</head>

<body>
    <div class="success-card">
        <div class="success-icon"><i class="fas fa-check-circle"></i></div>
        <h2 class="mb-2">Order Placed Successfully!</h2>
        <p class="text-muted mb-4">Your order has been confirmed and confirmation mail has been sent.</p>

        <a href="/view-orders" class="btn-primary-custom"><i class="fas fa-truck mr-2"></i>Track Orders</a>
        <a href="/customer/home" class="btn-primary-custom"><i class="fas fa-home mr-2"></i>Go to Home</a>
    </div>
</body>

</html>
