<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekart - Admin Login</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 576 512'%3E%3Cpath fill='%23f5a800' d='M528.12 301.319l47.273-208C578.806 78.301 567.391 64 551.99 64H159.208l-9.166-44.81C147.758 8.021 137.93 0 126.529 0H24C10.745 0 0 10.745 0 24v16c0 13.255 10.745 24 24 24h69.883l70.248 343.435C147.325 417.1 136 435.222 136 456c0 30.928 25.072 56 56 56s56-25.072 56-56c0-15.674-6.447-29.835-16.824-40h209.647C430.447 426.165 424 440.326 424 456c0 30.928 25.072 56 56 56s56-25.072 56-56c0-22.172-12.888-41.332-31.579-50.405l5.517-24.276c3.413-15.018-8.002-29.319-23.403-29.319H218.117l-6.545-32h293.145c11.206 0 20.92-7.754 23.403-18.681z'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --yellow:       #f5a800;
            --yellow-d:     #d48f00;
            --glass-border: rgba(255, 255, 255, 0.22);
            --glass-card:   rgba(255, 255, 255, 0.13);
            --glass-nav:    rgba(0, 0, 0, 0.25);
            --text-white:   #ffffff;
            --text-light:   rgba(255,255,255,0.80);
            --text-dim:     rgba(255,255,255,0.50);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            color: var(--text-white);
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* ── BACKGROUND ── */
        .bg-layer { position: fixed; inset: 0; z-index: -1; overflow: hidden; }
        .bg-layer::before {
            content: '';
            position: absolute; inset: -20px;
            background: url('https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?w=1600&q=80') center/cover no-repeat;
            filter: blur(6px);
            transform: scale(1.08);
        }
        .bg-layer::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(180deg, rgba(5,8,20,0.82) 0%, rgba(8,12,28,0.78) 40%, rgba(5,8,20,0.88) 100%);
        }

        /* ── NAV ── */
        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            padding: 1rem 3rem;
            display: flex; align-items: center; justify-content: space-between;
            background: var(--glass-nav);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--glass-border);
            transition: background 0.3s;
        }
        nav.scrolled { background: rgba(0,0,0,0.45); }

        .nav-brand {
            font-size: 1.6rem; font-weight: 700;
            color: var(--text-white); text-decoration: none;
            letter-spacing: 0.04em;
            display: flex; align-items: center; gap: 0.5rem;
        }
        .nav-brand span { color: var(--yellow); }

        /* Nav links — scrollable row on desktop */
        .nav-links {
            display: flex; align-items: center; gap: 0.5rem;
            flex-wrap: wrap; justify-content: flex-end;
        }
        .nav-link-btn {
            display: flex; align-items: center; gap: 0.35rem;
            color: var(--text-light); text-decoration: none;
            font-size: 0.78rem; font-weight: 500;
            padding: 0.38rem 0.8rem; border-radius: 6px;
            border: 1px solid var(--glass-border);
            transition: all 0.2s; white-space: nowrap;
        }
        .nav-link-btn:hover { color: white; background: rgba(255,255,255,0.1); }
        .nav-link-btn.active {
            color: var(--yellow);
            border-color: rgba(245,168,0,0.4);
            background: rgba(245,168,0,0.08);
        }

        /* ── ALERTS ── */
        .alert-stack {
            position: fixed; top: 5rem; right: 1.5rem;
            z-index: 200; display: flex; flex-direction: column; gap: 0.5rem;
        }
        .alert {
            padding: 0.875rem 1.25rem;
            background: rgba(10,12,30,0.88); backdrop-filter: blur(16px);
            border: 1px solid; border-radius: 10px;
            display: flex; align-items: center; gap: 0.625rem;
            font-size: 0.825rem; min-width: 260px;
            animation: slideIn 0.3s ease both;
        }
        .alert-success { border-color: rgba(34,197,94,0.45); color: #22c55e; }
        .alert-danger  { border-color: rgba(255,100,80,0.45); color: #ff8060; }
        .alert-close { margin-left: auto; background: none; border: none; color: inherit; cursor: pointer; opacity: 0.6; font-size: 1rem; }

        /* ── PAGE CENTER ── */
        .page-center {
            flex: 1;
            display: flex; align-items: center; justify-content: center;
            padding: 7rem 1.5rem 3rem;
        }

        /* ── AUTH CARD ── */
        .auth-card {
            background: var(--glass-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 3rem;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            animation: fadeUp 0.5s cubic-bezier(0.23,1,0.32,1) both;
        }

        /* ── CARD HEADER ── */
        .auth-header { text-align: center; margin-bottom: 2.25rem; }

        .auth-header-icon {
            width: 72px; height: 72px;
            background: rgba(245,168,0,0.15);
            border: 2px solid rgba(245,168,0,0.3);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.75rem; color: var(--yellow);
            margin: 0 auto 1.25rem;
        }
        .auth-header h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.35rem; }
        .auth-header p  { font-size: 0.825rem; color: var(--text-dim); line-height: 1.55; }

        /* ── DIVIDER ── */
        .divider { border: none; border-top: 1px solid var(--glass-border); margin: 0 0 2rem; }

        /* ── FORM ── */
        .form-group { margin-bottom: 1.5rem; }

        .form-group label {
            display: block; font-size: 0.72rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.1em;
            color: var(--text-dim); margin-bottom: 0.55rem; margin-left: 0.2rem;
        }

        .input-wrapper { position: relative; }
        .input-wrapper .input-icon {
            position: absolute; left: 1rem; top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim); font-size: 0.875rem;
            transition: color 0.3s; pointer-events: none; z-index: 1;
        }
        .input-wrapper:focus-within .input-icon { color: var(--yellow); }

        .form-control {
            width: 100%;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 0.85rem 1rem 0.85rem 2.75rem;
            color: white;
            font-family: 'Poppins', sans-serif;
            font-size: 0.875rem;
            transition: all 0.3s;
        }
        .form-control::placeholder { color: var(--text-dim); }
        .form-control:focus {
            outline: none;
            background: rgba(255,255,255,0.10);
            border-color: var(--yellow);
            box-shadow: 0 0 0 3px rgba(245,168,0,0.12);
        }

        /* ── SUBMIT ── */
        .btn-submit {
            width: 100%;
            background: var(--yellow); color: #1a1000;
            border: none; border-radius: 12px;
            padding: 0.9rem;
            margin-top: 0.5rem;
            font-family: 'Poppins', sans-serif;
            font-size: 0.875rem; font-weight: 700;
            letter-spacing: 0.06em; text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.23,1,0.32,1);
            box-shadow: 0 8px 24px rgba(245,168,0,0.25);
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
        }
        .btn-submit:hover {
            background: var(--yellow-d);
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(245,168,0,0.42);
        }
        .btn-submit:active { transform: translateY(0); }

        /* ── OTHER LOGIN LINKS ── */
        .other-logins {
            margin-top: 1.75rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--glass-border);
        }
        .other-logins p {
            font-size: 0.7rem; color: var(--text-dim);
            text-align: center; margin-bottom: 0.875rem;
            text-transform: uppercase; letter-spacing: 0.08em;
        }
        .other-login-btns {
            display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem;
        }
        .other-login-link {
            display: flex; align-items: center; justify-content: center; gap: 0.35rem;
            color: var(--text-dim); text-decoration: none;
            font-size: 0.72rem; font-weight: 600;
            padding: 0.5rem 0.75rem; border-radius: 8px;
            border: 1px solid var(--glass-border);
            transition: all 0.2s; text-align: center;
        }
        .other-login-link:hover { color: white; background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.3); }

        /* ── FOOTER ── */
        footer {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(16px);
            border-top: 1px solid var(--glass-border);
            padding: 1.25rem 3rem;
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 0.75rem;
        }
        .footer-brand { font-size: 1.1rem; font-weight: 700; color: white; }
        .footer-brand span { color: var(--yellow); }
        .footer-copy { font-size: 0.72rem; color: var(--text-dim); }

        /* ── ANIMATIONS ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(14px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        /* ── RESPONSIVE ── */
        @media(max-width: 768px) {
            nav { padding: 0.875rem 1rem; gap: 0.5rem; }
            .nav-links { display: none; }
            .auth-card { padding: 2rem 1.5rem; }
            footer { padding: 1.25rem; flex-direction: column; text-align: center; }
        }

        /* ── SOCIAL LOGIN ── */
        .social-divider {
            display: flex; align-items: center; gap: 1rem;
            margin: 1.5rem 0;
            color: var(--text-dim); font-size: 0.75rem;
            text-transform: uppercase; letter-spacing: 0.1em;
        }
        .social-divider::before, .social-divider::after {
            content: ''; flex: 1; height: 1px;
            background: var(--glass-border);
        }
        .social-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
        }
        .social-btn {
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
            padding: 0.7rem 1rem; border-radius: 10px;
            text-decoration: none; font-size: 0.85rem; font-weight: 500;
            transition: all 0.2s;
            border: 1px solid var(--glass-border);
        }
        .google-btn {
            background: rgba(255,255,255,0.05);
            color: var(--text-white);
        }
        .google-btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(66,133,244,0.5);
        }
        .facebook-btn {
            background: rgba(24,119,242,0.1);
            color: var(--text-white);
        }
        .facebook-btn:hover {
            background: rgba(24,119,242,0.2);
            border-color: rgba(24,119,242,0.5);
        }
        .instagram-btn {
            background: linear-gradient(45deg, rgba(253,29,29,0.1), rgba(131,58,180,0.1));
            color: var(--text-white);
        }
        .instagram-btn:hover {
            background: linear-gradient(45deg, rgba(253,29,29,0.2), rgba(131,58,180,0.2));
            border-color: rgba(225,48,108,0.5);
        }
        .github-btn {
            background: rgba(255,255,255,0.05);
            color: var(--text-white);
        }
        .github-btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.4);
        }
        .social-btn i, .social-btn svg {
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

<div class="bg-layer"></div>

<!-- ── FLOATING ALERTS ── -->
<div class="alert-stack">
    <div class="alert alert-success" th:if="${session.success}">
        <i class="fas fa-check-circle"></i>
        <span th:text="${session.success}"></span>
        <button class="alert-close" onclick="this.parentElement.remove()">×</button>
    </div>
    <div class="alert alert-danger" th:if="${session.failure}">
        <i class="fas fa-exclamation-circle"></i>
        <span th:text="${session.failure}"></span>
        <button class="alert-close" onclick="this.parentElement.remove()">×</button>
    </div>
    <th:block th:text="${@messageRemover.remove()}"></th:block>
</div>

<!-- ── NAV ── -->
<nav id="nav">
    <a href="/" class="nav-brand">
        <i class="fas fa-shopping-cart" style="font-size:1.1rem;"></i>
        Ekart
    </a>
    <div class="nav-links">
        <a href="/vendor/login"      class="nav-link-btn"><i class="fas fa-sign-in-alt"></i> Vendor Login</a>
        <a href="/vendor/register"   class="nav-link-btn"><i class="fas fa-user-plus"></i> Vendor Register</a>
        <a href="/customer/login"    class="nav-link-btn"><i class="fas fa-sign-in-alt"></i> Customer Login</a>
        <a href="/customer/register" class="nav-link-btn"><i class="fas fa-user-plus"></i> Customer Register</a>
        <a href="/admin/login"       class="nav-link-btn active"><i class="fas fa-shield-alt"></i> Admin Login</a>
    </div>
</nav>

<!-- ── MAIN ── -->
<main class="page-center">
    <div class="auth-card">

        <!-- Header -->
        <div class="auth-header">
            <div class="auth-header-icon">
                <i class="fas fa-user-lock"></i>
            </div>
            <h2>Admin Login</h2>
            <p>Restricted access — authorised personnel only.</p>
        </div>

        <hr class="divider">

        <!-- Form -->
        <form action="/admin/login" method="post">

            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="email" name="email"
                           class="form-control"
                           placeholder="admin@ekart.com" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="password" name="password"
                           class="form-control"
                           placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn-submit">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>

        </form>

        <div class="social-divider">
            <span>or continue with</span>
        </div>

        <div class="social-buttons">
            <a href="/oauth2/authorize/google?type=admin" class="social-btn google-btn">
                <svg viewBox="0 0 24 24" width="20" height="20">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Google
            </a>
            <a href="/oauth2/authorize/facebook?type=admin" class="social-btn facebook-btn">
                <i class="fab fa-facebook-f"></i>
                Facebook
            </a>
            <a href="/oauth2/authorize/instagram?type=admin" class="social-btn instagram-btn">
                <i class="fab fa-instagram"></i>
                Instagram
            </a>
            <a href="/oauth2/authorize/github?type=admin" class="social-btn github-btn">
                <i class="fab fa-github"></i>
                GitHub
            </a>
        </div>

    </div>
</main>

<!-- ── FOOTER ── -->
<footer>
    <div class="footer-brand">Ekart</div>
    <div class="footer-copy">© 2026 Ekart. All rights reserved.</div>
</footer>

<script>
    window.addEventListener('scroll', () => {
        document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 10);
    });

    setTimeout(() => {
        document.querySelectorAll('.alert-stack .alert').forEach(el => {
            el.style.transition = 'opacity 0.5s';
            el.style.opacity = '0';
            setTimeout(() => el.remove(), 500);
        });
    }, 2500);
</script>


<script src="/js/ekart-loader.js"></script>
</body>
</html>
