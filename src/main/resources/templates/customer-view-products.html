<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekart - View Products</title>
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 576 512'%3E%3Cpath fill='%23000000' d='M528.12 301.319l47.273-208C578.806 78.301 567.391 64 551.99 64H159.208l-9.166-44.81C147.758 8.021 137.93 0 126.529 0H24C10.745 0 0 10.745 0 24v16c0 13.255 10.745 24 24 24h69.883l70.248 343.435C147.325 417.1 136 435.222 136 456c0 30.928 25.072 56 56 56s56-25.072 56-56c0-15.674-6.447-29.835-16.824-40h209.647C430.447 426.165 424 440.326 424 456c0 30.928 25.072 56 56 56s56-25.072 56-56c0-22.172-12.888-41.332-31.579-50.405l5.517-24.276c3.413-15.018-8.002-29.319-23.403-29.319H218.117l-6.545-32h293.145c11.206 0 20.92-7.754 23.403-18.681z'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
    :root {
        --primary-color: #2563eb;
        --secondary-color: #f8fafc;
        --accent-color: #ef4444;
        --text-color: #1e293b;
        --light-text: #64748b;
    }

    body {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        font-family: 'Poppins', sans-serif;
        background-color: var(--secondary-color);
        color: var(--text-color);
    }

    .container {
        flex: 1;
        padding: 2rem;
        max-width: 1200px;
        margin: 0 auto;
    }

    .navbar {
        background: linear-gradient(135deg, var(--primary-color), #1e40af);
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        padding: 1rem 2rem;
    }

    .navbar-brand {
        font-size: 1.8rem;
        font-weight: 700;
        color: white !important;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .nav-link {
        color: white !important;
        font-weight: 500;
        transition: all 0.3s ease;
        padding: 0.5rem 1rem;
        margin: 0 0.5rem;
        border-radius: 0.5rem;
        font-size: 0.95rem;
    }

    .nav-link:hover {
        background-color: rgba(255, 255, 255, 0.15);
        transform: translateY(-2px);
    }

    /* Modern Card Upgrade */
    .card {
        background-color: white;
        border-radius: 1.25rem;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        padding: 2rem;
        margin-bottom: 2rem;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        border: none;
        overflow: hidden;
    }

    .card:hover {
        transform: translateY(-10px);
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
    }

    .card-image {
        width: 100%;
        height: 200px;
        object-fit: cover;
        border-radius: 1rem;
        margin-bottom: 1.5rem;
    }

    .card-label {
        font-weight: 600;
        color: var(--text-color);
        margin-right: 0.5rem;
    }

    /* Modern Price and Review Styles */
    .price-tag {
        font-size: 1.6rem;
        font-weight: 700;
        color: var(--primary-color);
        margin: 0.5rem 0;
    }

    .review-box {
        background-color: #f1f5f9;
        border-radius: 12px;
        padding: 12px;
        margin-bottom: 10px;
        border-left: 5px solid #fbbf24;
    }

    .btn-custom {
        padding: 1rem 2rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: all 0.3s ease;
        background-color: var(--primary-color);
        color: white;
        border: none;
        border-radius: 0.8rem;
        width: 100%;
        display: block;
        text-align: center;
    }

    .btn-custom:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        background-color: #1e40af;
        color: white;
        text-decoration: none;
    }

    .btn-delete {
        background-color: var(--accent-color);
    }

    .btn-delete:hover {
        background-color: #dc2626;
    }

    .alert {
        margin-bottom: 1.5rem;
        border-radius: 0.5rem;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        border: none;
    }

    footer {
        background: linear-gradient(135deg, #1e40af, var(--primary-color));
        color: white;
        padding: 2rem 0;
        box-shadow: 0 -4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .animate-in {
        animation: fadeIn 0.8s ease-out forwards;
    }

    /* 🔥 SMART BUDGET MODE */
    .budget-bar {
        background: linear-gradient(135deg, #f0fdf4, #dcfce7);
        border: 2px solid #86efac;
        border-radius: 1rem;
        padding: 1.2rem 1.5rem;
        margin-bottom: 1.5rem;
        display: flex;
        align-items: center;
        gap: 1rem;
        flex-wrap: wrap;
    }
    .budget-bar label {
        font-weight: 700;
        color: #166534;
        font-size: 0.95rem;
        margin: 0;
        white-space: nowrap;
    }
    .budget-bar input[type=range] {
        flex: 1;
        min-width: 160px;
        accent-color: #16a34a;
    }
    .budget-bar .budget-value {
        font-weight: 700;
        font-size: 1.1rem;
        color: #15803d;
        min-width: 80px;
    }
    .budget-bar .btn-reset {
        background: none;
        border: 2px solid #86efac;
        color: #166534;
        border-radius: 8px;
        padding: 0.3rem 0.9rem;
        font-weight: 600;
        font-size: 0.85rem;
        cursor: pointer;
        transition: all 0.2s;
    }
    .budget-bar .btn-reset:hover {
        background: #16a34a;
        color: white;
    }
    .budget-mode-active .col-md-4 {
        transition: opacity 0.3s, transform 0.3s;
    }
    .product-over-budget {
        opacity: 0.25 !important;
        transform: scale(0.97);
        pointer-events: none;
    }
    .budget-badge {
        display: none;
        position: absolute;
        top: 12px;
        right: 12px;
        background: #16a34a;
        color: white;
        font-size: 0.72rem;
        font-weight: 700;
        padding: 3px 10px;
        border-radius: 20px;
        z-index: 10;
    }
    .within-budget .budget-badge {
        display: inline-block;
    }
    .budget-mode-active .card {
        position: relative;
    }
    .budget-count {
        font-size: 0.85rem;
        color: #166534;
        font-weight: 600;
        margin-left: auto;
    }
</style>
    <link rel="stylesheet" href="/css/common-layout.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light">
        <a class="navbar-brand" href="/customer/home"><i class="fas fa-shopping-cart mr-2"></i>Ekart</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/logout"><i class="fas fa-sign-out-alt mr-2"></i> Logout</a>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="alert alert-success alert-dismissible fade show" th:if="${session.success}" role="alert">
              <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                <span aria-hidden="true">Ã—</span>
            </button>
        </div>
        <div class="alert alert-danger alert-dismissible fade show" th:if="${session.failure}" role="alert">
            <span th:text="${session.failure}"></span>
            <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                <span aria-hidden="true">Ã—</span>
            </button>
        </div>
        <th:block th:text="${@messageRemover.remove()}"></th:block>
     <span th:text="${session.success}"></span>
     
        <!-- 🔥 SMART BUDGET SHOPPING MODE -->
        <div class="budget-bar" id="budgetBar">
            <span style="font-size:1.4rem;">💰</span>
            <label for="budgetSlider">Budget Mode:</label>
            <input type="range" id="budgetSlider" min="0" max="10000" step="50" value="10000"
                   oninput="applyBudget(this.value)">
            <span class="budget-value" id="budgetDisplay">All Products</span>
            <span class="budget-count" id="budgetCount"></span>
            <button class="btn-reset" onclick="resetBudget()">Reset</button>
        </div>

        <div class="row" id="productRow">
            <div class="col-md-4 mb-4 product-card-wrapper" th:each="p:${products}" th:attr="data-price=${p.price}">
                <div class="card animate-in">
                    <div style="position:relative;">
                        <!-- Main image -->
                        <img class="card-image" th:src="${p.imageLink}" th:id="'mainImg-' + ${p.id}">
                        <span class="budget-badge">✓ Within Budget</span>
                    </div>

                    <!-- 🔥 Extra image thumbnails -->
                    <div th:if="${p.extraImageList != null and !p.extraImageList.isEmpty()}"
                         style="display:flex; gap:4px; padding:6px 8px; background:#f8fafc; overflow-x:auto;">
                        <!-- Main image thumbnail -->
                        <img th:src="${p.imageLink}"
                             th:onclick="'document.getElementById(\'mainImg-\' + ' + ${p.id} + ').src=this.src'"
                             style="width:44px; height:44px; object-fit:cover; border-radius:6px; cursor:pointer; border:2px solid #4a90e2;">
                        <!-- Extra thumbnails -->
                        <img th:each="url : ${p.extraImageList}"
                             th:src="${url}"
                             th:onclick="'document.getElementById(\'mainImg-\' + ' + ${p.id} + ').src=this.src'"
                             style="width:44px; height:44px; object-fit:cover; border-radius:6px; cursor:pointer; border:2px solid #e2e8f0;">
                    </div>

                    <!-- 🔥 Video player -->
                    <div th:if="${p.videoLink != null and !#strings.isEmpty(p.videoLink)}"
                         style="padding:0 8px 6px;">
                        <video controls style="width:100%; border-radius:8px; max-height:180px;">
                            <source th:src="${p.videoLink}" type="video/mp4">
                            Your browser does not support the video tag.
                        </video>
                    </div>
                    <div class="card-content">
                        <div class="mb-2">
                            <span class="card-label">Name:</span>
                            <span th:text="${p.name}"></span>
                        </div>
                        <div class="mb-2">
                            <span class="card-label">Description:</span>
                            <span th:text="${p.description}"></span>
                        </div>
                        <div class="mb-2">
                            <span class="card-label">Stock:</span>
                            <span th:text="${p.stock}+' Units'"></span>
                        </div>
                        <div class="mb-2">
                            <span class="card-label">Price:</span>
                            <span th:text="${p.price}"></span>
                        </div>
                        <div class="mb-3">
                            <span class="card-label">Category:</span>
                            <span th:text="${p.category}"></span>
                        </div>
                        
                        
    <div class="mt-4 pt-3 border-top">
        <h6 class="font-weight-bold mb-3"><i class="fas fa-star text-warning mr-2"></i>Product Reviews</h6>
        
        <div th:each="review : ${p.reviews}" class="review-box shadow-sm">
            <div class="d-flex justify-content-between align-items-center mb-1">
                <span class="text-warning small">
                    <i th:each="i : ${#numbers.sequence(1, review.rating)}" class="fas fa-star"></i>
                </span>
                <small class="font-weight-bold text-muted" th:text="${review.customerName}"></small>
            </div>
            <p class="mb-0 small" th:text="${review.comment}"></p>
        </div>

        <form action="/add-review" method="post" class="mt-3">
            <input type="hidden" name="productId" th:value="${p.id}">
            <div class="input-group input-group-sm mb-2">
                <select name="rating" class="custom-select col-4" required>
                    <option value="5">5 ★</option>
                    <option value="4">4 ★</option>
                    <option value="3">3 ★</option>
                    <option value="2">2 ★</option>
                    <option value="1">1 ★</option>
                </select>
                <input type="text" name="comment" class="form-control" placeholder="Write review..." required>
                <div class="input-group-append">
                    <button class="btn btn-primary" type="submit">Post</button>
                </div>
            </div>
        </form>
    </div>
</div>

                        <div class="d-flex justify-content-between">
                            <a th:href="'/add-cart/'+${p.id}"><button class="btn-custom"><i
                                        class="fas fa-check mr-2"></i>Add to Cart</button></a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="text-center mt-4">
            <a href="/customer/home" class="btn-custom"><i class="fas fa-arrow-left mr-2"></i>Back to Dashboard</a>
        </div>
    </div>

    <footer class="text-center text-lg-start mt-auto">
        <div class="text-center p-3">
            Â© 2026 Ekart. All rights reserved. | <i class="fas fa-heart text-danger"></i> Made with passion
        </div>
    </footer>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script>
        window.setTimeout(function () {
            $(".alert").fadeTo(500, 0).slideUp(500, function () {
                $(this).remove();
            });
        }, 2000);

        // 🔥 SMART BUDGET SHOPPING MODE
        var maxPrice = 0;
        document.querySelectorAll('.product-card-wrapper').forEach(function(el) {
            var p = parseFloat(el.getAttribute('data-price')) || 0;
            if (p > maxPrice) maxPrice = p;
        });
        // Set slider max to highest product price, rounded up to nearest 500
        var sliderMax = Math.ceil(maxPrice / 500) * 500 || 10000;
        var slider = document.getElementById('budgetSlider');
        slider.max = sliderMax;
        slider.value = sliderMax;

        function applyBudget(val) {
            val = parseFloat(val);
            var display = document.getElementById('budgetDisplay');
            var count = document.getElementById('budgetCount');
            var row = document.getElementById('productRow');
            var cards = document.querySelectorAll('.product-card-wrapper');
            var visible = 0;

            row.classList.add('budget-mode-active');

            cards.forEach(function(el) {
                var price = parseFloat(el.getAttribute('data-price')) || 0;
                if (price <= val) {
                    el.classList.remove('product-over-budget');
                    el.classList.add('within-budget');
                    visible++;
                } else {
                    el.classList.add('product-over-budget');
                    el.classList.remove('within-budget');
                }
            });

            display.textContent = '₹' + val.toLocaleString('en-IN');
            count.textContent = visible + ' of ' + cards.length + ' products';
        }

        function resetBudget() {
            var slider = document.getElementById('budgetSlider');
            slider.value = slider.max;
            document.getElementById('budgetDisplay').textContent = 'All Products';
            document.getElementById('budgetCount').textContent = '';
            document.getElementById('productRow').classList.remove('budget-mode-active');
            document.querySelectorAll('.product-card-wrapper').forEach(function(el) {
                el.classList.remove('product-over-budget', 'within-budget');
            });
        }
    </script>

    
</body>

</html>
