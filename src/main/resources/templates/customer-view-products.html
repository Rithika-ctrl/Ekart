<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekart - Premium View Products</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 576 512'%3E%3Cpath fill='%23f5a800' d='M528.12 301.319l47.273-208C578.806 78.301 567.391 64 551.99 64H159.208l-9.166-44.81C147.758 8.021 137.93 0 126.529 0H24C10.745 0 0 10.745 0 24v16c0 13.255 10.745 24 24 24h69.883l70.248 343.435C147.325 417.1 136 435.222 136 456c0 30.928 25.072 56 56 56s56-25.072 56-56c0-15.674-6.447-29.835-16.824-40h209.647C430.447 426.165 424 440.326 424 456c0 30.928 25.072 56 56 56s56-25.072 56-56c0-22.172-12.888-41.332-31.579-50.405l5.517-24.276c3.413-15.018-8.002-29.319-23.403-29.319H218.117l-6.545-32h293.145c11.206 0 20.92-7.754 23.403-18.681z'/%3E%3C/svg%3E">
    
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --yellow:       #f5a800;
            --yellow-d:     #d48f00;
            --glass-border: rgba(255, 255, 255, 0.22);
            --glass-card:   rgba(255, 255, 255, 0.13);
            --glass-nav:    rgba(0, 0, 0, 0.25);
            --text-white:   #ffffff;
            --text-dim:     rgba(255,255,255,0.50);
            --bg-blur:      blur(8px);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            color: var(--text-white);
            display: flex;
            flex-direction: column;
        }

        /* ── DYNAMIC BACKGROUND ── */
        .bg-layer {
            position: fixed; inset: 0; z-index: -1;
            overflow: hidden;
        }
        .bg-layer::before {
            content: '';
            position: absolute; inset: -20px;
            background: url('https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?w=1600&q=80') center/cover no-repeat;
            filter: var(--bg-blur);
            transform: scale(1.08);
        }
        .bg-layer::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(180deg, rgba(5, 8, 20, 0.85) 0%, rgba(8, 12, 28, 0.8) 40%, rgba(5, 8, 20, 0.9) 100%);
        }

        /* ── NAVIGATION ── */
        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            padding: 1rem 3rem;
            display: flex; align-items: center; justify-content: space-between;
            background: var(--glass-nav);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--glass-border);
        }
        .nav-brand {
            font-size: 1.6rem; font-weight: 700;
            color: var(--text-white); text-decoration: none;
            letter-spacing: 0.04em;
        }
        .nav-brand span { color: var(--yellow); }

        /* ── PAGE LAYOUT ── */
        .page {
            flex: 1;
            padding: 7rem 3rem 3rem;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        /* ── PREMIUM BUDGET BAR ── */
        .budget-bar {
            background: var(--glass-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.5rem 2.5rem;
            margin-bottom: 2.5rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap;
            animation: fadeUp 0.5s ease both;
        }
        .budget-bar label { font-weight: 700; color: var(--yellow); font-size: 0.95rem; margin: 0; }
        .budget-bar input[type=range] { flex: 1; accent-color: var(--yellow); cursor: pointer; }
        .budget-value { font-weight: 800; font-size: 1.2rem; min-width: 110px; color: white; }
        .btn-reset {
            background: transparent; border: 1px solid var(--yellow);
            color: var(--yellow); padding: 0.4rem 1.2rem;
            border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        .btn-reset:hover { background: var(--yellow); color: #1a1000; }

        /* ── PRODUCT GRID ── */
        .row { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 2rem; }

        .product-card {
            background: var(--glass-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 22px;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.23,1,0.32,1);
            display: flex;
            flex-direction: column;
            animation: fadeUp 0.6s ease both;
            position: relative;
        }
        .product-card:hover {
            transform: translateY(-10px);
            border-color: rgba(245,168,0,0.45);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        .img-area { position: relative; height: 240px; overflow: hidden; }
        .card-image { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .product-card:hover .card-image { transform: scale(1.08); }
        
        .budget-badge {
            position: absolute; top: 15px; right: 15px;
            background: #22c55e; color: white;
            font-size: 0.72rem; font-weight: 800;
            padding: 5px 12px; border-radius: 50px;
            display: none; z-index: 10;
        }
        .within-budget .budget-badge { display: block; }

        /* ── THUMBNAILS & VIDEO ── */
        .media-tray { background: rgba(0,0,0,0.3); padding: 8px 12px; display: flex; gap: 8px; overflow-x: auto; }
        .media-tray img { width: 48px; height: 48px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; object-fit: cover; transition: 0.2s; }
        .media-tray img:hover { border-color: var(--yellow); transform: scale(1.1); }

        .video-box { padding: 10px; }
        video { width: 100%; border-radius: 12px; max-height: 180px; background: #000; border: 1px solid var(--glass-border); }

        /* ── CARD CONTENT ── */
        .card-body { padding: 1.5rem; display: flex; flex-direction: column; gap: 0.8rem; flex: 1; }
        .label-text { font-size: 0.75rem; font-weight: 700; color: var(--yellow); text-transform: uppercase; margin-right: 5px; }
        .val-text { font-size: 0.9rem; color: white; }
        
        .price-tag { font-size: 1.7rem; font-weight: 800; color: var(--yellow); margin-top: 5px; }
        .prod-category { font-size: 0.7rem; background: rgba(245,168,0,0.15); color: var(--yellow); padding: 4px 10px; border-radius: 6px; font-weight: 700; display: inline-block; }

        /* ── REVIEWS ── */
        .review-box { 
            background: rgba(255,255,255,0.05); border-radius: 12px; padding: 12px;
            margin-bottom: 10px; border-left: 4px solid var(--yellow);
        }
        .review-customer { font-size: 0.75rem; font-weight: 700; color: white; }
        .review-comment { font-size: 0.75rem; color: var(--text-dim); }

        /* ── BUTTONS ── */
        .btn-primary-premium {
            background: var(--yellow); color: #1a1000;
            border: none; border-radius: 14px; padding: 1rem;
            font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
            cursor: pointer; transition: 0.3s; width: 100%; text-align: center;
        }
        .btn-primary-premium:hover { background: var(--yellow-d); transform: translateY(-2px); box-shadow: 0 10px 25px rgba(245,168,0,0.4); color: #1a1000; text-decoration: none; }

        .btn-back {
            background: transparent; border: 1px solid var(--glass-border); color: white;
            padding: 0.8rem 2rem; border-radius: 12px; font-weight: 600; transition: 0.3s;
        }
        .btn-back:hover { background: rgba(255,255,255,0.1); color: white; text-decoration: none; }

        /* ── UTILS ── */
        .product-over-budget { opacity: 0.2; filter: grayscale(1); pointer-events: none; transform: scale(0.96); }
        @keyframes fadeUp { from { opacity:0; transform:translateY(25px); } to { opacity:1; transform:translateY(0); } }

        /* Alerts */
        .alert { 
            position: fixed; top: 6rem; right: 2rem; z-index: 1000;
            background: rgba(15,20,40,0.95); backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); padding: 1rem 1.5rem; border-radius: 15px;
        }
    </style>
</head>
<body>

<div class="bg-layer"></div>

<nav>
    <a href="/customer/home" class="nav-brand"><span>Ekart</span> Shop</a>
    <div style="display:flex; gap:1.5rem; align-items:center;">
        <a href="/logout" style="color:var(--text-dim); text-decoration:none; font-size:0.85rem;"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>
</nav>

<div class="page">
    <div th:if="${session.success}" class="alert" style="color:#4ade80;">
        <i class="fas fa-check-circle mr-2"></i> <span th:text="${session.success}"></span>
    </div>
    <div th:if="${session.failure}" class="alert" style="color:#ff6b6b;">
        <i class="fas fa-times-circle mr-2"></i> <span th:text="${session.failure}"></span>
    </div>
    <th:block th:text="${@messageRemover.remove()}"></th:block>

    <div class="budget-bar" id="budgetBar">
        <label for="budgetSlider"><i class="fas fa-coins mr-2"></i>Budget Mode:</label>
        <input type="range" id="budgetSlider" min="0" max="10000" step="50" value="10000" oninput="applyBudget(this.value)">
        <span class="budget-value" id="budgetDisplay">All Products</span>
        <span id="budgetCount" style="color:var(--text-dim); font-size:0.8rem; margin-left:auto;"></span>
        <button class="btn-reset" onclick="resetBudget()">Reset</button>
    </div>

    <div class="row" id="productRow">
        <div th:each="p:${products}" class="product-card-wrapper" th:attr="data-price=${p.price}">
            <div class="product-card">
                <div class="img-area">
                    <img class="card-image" th:src="${p.imageLink}" th:id="'mainImg-' + ${p.id}">
                    <span class="budget-badge"><i class="fas fa-check-double mr-1"></i>In Budget</span>
                </div>

                <div class="media-tray" th:if="${p.extraImageList != null and !p.extraImageList.isEmpty()}">
                    <img th:src="${p.imageLink}" th:onclick="'document.getElementById(\'mainImg-\' + ' + ${p.id} + ').src=this.src'">
                    <img th:each="url : ${p.extraImageList}" th:src="${url}" th:onclick="'document.getElementById(\'mainImg-\' + ' + ${p.id} + ').src=this.src'">
                </div>

                <div class="video-box" th:if="${p.videoLink != null and !#strings.isEmpty(p.videoLink)}">
                    <video controls><source th:src="${p.videoLink}" type="video/mp4"></video>
                </div>

                <div class="card-body">
                    <div class="prod-category" th:text="${p.category}"></div>
                    
                    <div>
                        <span class="label-text">Name:</span>
                        <span class="val-text" th:text="${p.name}"></span>
                    </div>
                    <div>
                        <span class="label-text">Description:</span>
                        <span class="val-text" th:text="${p.description}"></span>
                    </div>
                    <div>
                        <span class="label-text">Stock:</span>
                        <span class="val-text" th:text="${p.stock}+' Units'"></span>
                    </div>
                    
                    <div class="price-tag">₹<span th:text="${p.price}"></span></div>
                    
                    <div class="mt-3 pt-3 border-top" style="border-color: var(--glass-border) !important;">
                        <h6 class="font-weight-bold small text-white mb-3"><i class="fas fa-star text-warning mr-2"></i>Reviews</h6>
                        
                        <div th:each="review : ${p.reviews}" class="review-box">
                            <div class="d-flex justify-content-between align-items-center mb-1">
                                <span class="text-warning" style="font-size: 0.65rem;">
                                    <i th:each="i : ${#numbers.sequence(1, review.rating)}" class="fas fa-star"></i>
                                </span>
                                <span class="review-customer" th:text="${review.customerName}"></span>
                            </div>
                            <p class="review-comment mb-0" th:text="${review.comment}"></p>
                        </div>

                        <form action="/add-review" method="post" class="mt-3">
                            <input type="hidden" name="productId" th:value="${p.id}">
                            <div class="input-group input-group-sm">
                                <select name="rating" class="custom-select col-3" style="background:rgba(255,255,255,0.1); color:white; border-color:var(--glass-border);" required>
                                    <option value="5">5★</option><option value="4">4★</option><option value="3">3★</option>
                                </select>
                                <input type="text" name="comment" class="form-control" placeholder="Write review..." style="background:rgba(255,255,255,0.1); color:white; border-color:var(--glass-border);" required>
                                <div class="input-group-append">
                                    <button class="btn btn-warning" type="submit" style="font-weight:700; font-size:0.75rem;">Post</button>
                                </div>
                            </div>
                        </form>
                    </div>

                    <a th:href="'/add-cart/'+${p.id}" class="btn-primary-premium mt-3 text-center" style="text-decoration:none;">
                        <i class="fas fa-cart-plus mr-2"></i>ADD TO CART
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="text-center mt-5">
        <a href="/customer/home" class="btn-back"><i class="fas fa-arrow-left mr-2"></i>Back to Dashboard</a>
    </div>
</div>

<footer class="text-center py-4" style="background:rgba(0,0,0,0.5); backdrop-filter:blur(10px); border-top:1px solid var(--glass-border);">
    <div class="small text-white-50">
        © 2026 Ekart. All rights reserved. | <i class="fas fa-heart" style="color:var(--yellow);"></i> Made with passion
    </div>
</footer>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script>
    // 🔥 WORKING LOGIC PRESERVED
    window.setTimeout(function () {
        $(".alert").fadeOut(500);
    }, 2500);

    // 🔥 SMART BUDGET SHOPPING MODE (Working Logic Preserved)
    var maxPrice = 0;
    document.querySelectorAll('.product-card-wrapper').forEach(function(el) {
        var p = parseFloat(el.getAttribute('data-price')) || 0;
        if (p > maxPrice) maxPrice = p;
    });
    var sliderMax = Math.ceil(maxPrice / 500) * 500 || 10000;
    var slider = document.getElementById('budgetSlider');
    slider.max = sliderMax;
    slider.value = sliderMax;

    function applyBudget(val) {
        val = parseFloat(val);
        var display = document.getElementById('budgetDisplay');
        var count = document.getElementById('budgetCount');
        var row = document.getElementById('productRow');
        var cards = document.querySelectorAll('.product-card-wrapper');
        var visible = 0;

        row.classList.add('budget-mode-active');

        cards.forEach(function(el) {
            var price = parseFloat(el.getAttribute('data-price')) || 0;
            var card = el.querySelector('.product-card');
            if (price <= val) {
                el.classList.remove('product-over-budget');
                card.classList.add('within-budget');
                visible++;
            } else {
                el.classList.add('product-over-budget');
                card.classList.remove('within-budget');
            }
        });

        display.textContent = '₹' + val.toLocaleString('en-IN');
        count.textContent = visible + ' of ' + cards.length + ' products';
    }

    function resetBudget() {
        var slider = document.getElementById('budgetSlider');
        slider.value = slider.max;
        document.getElementById('budgetDisplay').textContent = 'All Products';
        document.getElementById('budgetCount').textContent = '';
        document.querySelectorAll('.product-card-wrapper').forEach(function(el) {
            el.classList.remove('product-over-budget');
            el.querySelector('.product-card').classList.remove('within-budget');
        });
    }
</script>

</body>
</html>
