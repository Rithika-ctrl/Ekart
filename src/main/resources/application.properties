# ===============================
# APPLICATION CONFIG
# ===============================
spring.application.name=ekart
server.port=8080


# ===============================
# H2 DATABASE CONFIG (PERSISTENT)
# ===============================
# 🔥 CHANGE 1: Save to a file named 'ekart_db' in the project folder
spring.datasource.url=jdbc:h2:file:./ekart_db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# 🔥 CHANGE 2: 'update' keeps data safe between restarts
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.jakarta.persistence.validation.mode=none

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console


