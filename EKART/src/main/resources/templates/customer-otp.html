<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekart - OTP Verification</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --yellow:       #f5a800;
            --yellow-d:     #d48f00;
            --glass-border: rgba(255, 255, 255, 0.22);
            --glass-card:   rgba(255, 255, 255, 0.13);
            --text-white:   #ffffff;
            --text-light:   rgba(255,255,255,0.80);
            --text-dim:     rgba(255,255,255,0.50);
            --input-bg:     rgba(255, 255, 255, 0.08);
            --input-border: rgba(255, 255, 255, 0.20);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            color: var(--text-white);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
        }

        /* ── BACKGROUND ── */
        .bg-layer {
            position: fixed; inset: 0; z-index: -1;
            overflow: hidden;
        }
        .bg-layer::before {
            content: '';
            position: absolute; inset: -20px;
            background: url('https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?w=1600&q=80') center/cover no-repeat;
            filter: blur(6px);
            transform: scale(1.08);
        }
        .bg-layer::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(
                180deg,
                rgba(5, 8, 20, 0.82) 0%,
                rgba(8, 12, 28, 0.78) 40%,
                rgba(5, 8, 20, 0.88) 100%
            );
        }

        /* ── ALERTS ── */
        .alert-stack {
            position: fixed; top: 1.5rem; right: 1.5rem;
            z-index: 200; display: flex; flex-direction: column; gap: 0.5rem;
        }
        .alert {
            padding: 0.875rem 1.25rem;
            background: rgba(10,12,30,0.88); backdrop-filter: blur(16px);
            border: 1px solid; border-radius: 10px;
            display: flex; align-items: center; gap: 0.625rem;
            font-size: 0.825rem; min-width: 260px;
            animation: slideIn 0.3s ease both;
        }
        .alert-success { border-color: rgba(34,197,94,0.45); color: #22c55e; }
        .alert-danger  { border-color: rgba(255,100,80,0.45); color: #ff8060; }
        .alert-close {
            margin-left: auto; background: none; border: none;
            color: inherit; cursor: pointer; opacity: 0.6; font-size: 1rem;
        }
        @keyframes slideIn { from{opacity:0;transform:translateX(14px)} to{opacity:1;transform:translateX(0)} }

        /* ── CARD ── */
        .otp-card {
            background: var(--glass-card);
            backdrop-filter: blur(22px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            width: 100%; max-width: 420px;
            box-shadow: 0 24px 80px rgba(0,0,0,0.45);
            animation: fadeUp 0.55s ease both;
            text-align: center;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* icon ring */
        .otp-icon-ring {
            width: 72px; height: 72px;
            background: rgba(245,168,0,0.15);
            border: 2px solid rgba(245,168,0,0.35);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 1.6rem; color: var(--yellow);
            animation: pulse-ring 2.5s ease-in-out infinite;
        }
        @keyframes pulse-ring {
            0%, 100% { box-shadow: 0 0 0 0 rgba(245,168,0,0.3); }
            50%       { box-shadow: 0 0 0 12px rgba(245,168,0,0); }
        }

        .otp-card h1 {
            font-size: 1.6rem; font-weight: 700;
            color: white; margin-bottom: 0.5rem;
        }
        .otp-card .subtitle {
            font-size: 0.82rem; color: var(--text-dim);
            line-height: 1.65; margin-bottom: 2.25rem;
        }
        .otp-card .subtitle span { color: var(--yellow); font-weight: 600; }

        /* OTP input boxes */
        .otp-inputs {
            display: flex; gap: 0.75rem;
            justify-content: center; margin-bottom: 1.75rem;
        }
        .otp-box {
            width: 52px; height: 58px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 1.5rem; font-weight: 700;
            color: white; text-align: center;
            outline: none; transition: all 0.25s;
            /* hide arrows on number input */
            -moz-appearance: textfield;
        }
        .otp-box::-webkit-outer-spin-button,
        .otp-box::-webkit-inner-spin-button { -webkit-appearance: none; }
        .otp-box:focus {
            border-color: var(--yellow);
            background: rgba(255,255,255,0.13);
            box-shadow: 0 0 0 3px rgba(245,168,0,0.18);
            transform: translateY(-2px);
        }
        .otp-box.filled { border-color: rgba(245,168,0,0.5); }

        /* hidden real input for form submission */
        #otp-hidden { display: none; }

        /* timer */
        .otp-timer {
            font-size: 0.78rem; color: var(--text-dim);
            margin-bottom: 1.75rem;
        }
        .otp-timer span { color: var(--yellow); font-weight: 600; }
        .resend-btn {
            background: none; border: none; cursor: pointer;
            color: var(--yellow); font-size: 0.78rem; font-weight: 600;
            font-family: 'Poppins', sans-serif;
            text-decoration: underline; display: none;
        }
        .resend-btn:hover { color: var(--yellow-d); }

        /* submit */
        .btn-submit {
            width: 100%;
            background: var(--yellow); color: #1a1000;
            border: none; border-radius: 50px;
            padding: 0.9rem;
            font-family: 'Poppins', sans-serif;
            font-size: 0.875rem; font-weight: 700;
            letter-spacing: 0.1em; text-transform: uppercase;
            cursor: pointer; transition: all 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
            box-shadow: 0 6px 24px rgba(245,168,0,0.35);
        }
        .btn-submit:hover {
            background: var(--yellow-d);
            transform: translateY(-2px);
            box-shadow: 0 10px 32px rgba(245,168,0,0.5);
        }
        .btn-submit:disabled {
            opacity: 0.5; cursor: not-allowed; transform: none;
        }

        .back-link {
            display: inline-flex; align-items: center; gap: 0.4rem;
            margin-top: 1.5rem; font-size: 0.78rem;
            color: var(--text-dim); text-decoration: none;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--text-white); }

        /* brand watermark bottom */
        .brand-mark {
            position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
            font-size: 0.75rem; color: var(--text-dim); letter-spacing: 0.1em;
        }
        .brand-mark span { color: var(--yellow); font-weight: 700; }
    </style>
</head>
<body>

<div class="bg-layer"></div>

<!-- Thymeleaf Alerts -->
<div class="alert-stack">
    <div class="alert alert-success" th:if="${session.success}">
        <i class="fas fa-check-circle"></i>
        <span th:text="${session.success}"></span>
        <button class="alert-close" onclick="this.parentElement.remove()">×</button>
    </div>
    <div class="alert alert-danger" th:if="${session.failure}">
        <i class="fas fa-exclamation-circle"></i>
        <span th:text="${session.failure}"></span>
        <button class="alert-close" onclick="this.parentElement.remove()">×</button>
    </div>
    <th:block th:text="${@messageRemover.remove()}"></th:block>
</div>

<!-- ── OTP CARD ── -->
<div class="otp-card">

    <div class="otp-icon-ring">
        <i class="fas fa-shield-alt"></i>
    </div>

    <h1>OTP Verification</h1>
    <p class="subtitle">
        We've sent a 6-digit code to your registered email.<br>
        Enter it below to <span>verify your account.</span>
    </p>

    <form action="/customer/otp" method="post" id="otpForm">
        <input type="hidden" name="id" th:value="${id}">
        <input type="hidden" name="otp" id="otp-hidden">

        <!-- Visual OTP boxes -->
        <div class="otp-inputs">
            <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
            <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
            <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
            <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
            <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
            <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
        </div>

        <!-- Timer -->
        <div class="otp-timer">
            Code expires in <span id="timer">02:00</span>
            <button type="button" class="resend-btn" id="resendBtn" onclick="resendOtp()">Resend OTP</button>
        </div>

        <button type="submit" class="btn-submit" id="verifyBtn" disabled>
            <i class="fas fa-check-circle"></i> Verify OTP
        </button>
    </form>

    <a href="/customer/login" class="back-link">
        <i class="fas fa-arrow-left" style="font-size:.7rem;"></i> Back to Login
    </a>
</div>

<div class="brand-mark">Ek<span>art</span> · Secure Verification</div>

<script>
    // ── OTP Box Logic ──
    const boxes = document.querySelectorAll('.otp-box');
    const hidden = document.getElementById('otp-hidden');
    const verifyBtn = document.getElementById('verifyBtn');

    boxes.forEach((box, i) => {
        box.addEventListener('input', () => {
            // Only allow digits
            box.value = box.value.replace(/\D/g, '');
            if (box.value) {
                box.classList.add('filled');
                if (i < boxes.length - 1) boxes[i + 1].focus();
            } else {
                box.classList.remove('filled');
            }
            syncHidden();
        });

        box.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && !box.value && i > 0) {
                boxes[i - 1].focus();
                boxes[i - 1].value = '';
                boxes[i - 1].classList.remove('filled');
                syncHidden();
            }
        });

        // Allow paste on first box
        box.addEventListener('paste', (e) => {
            e.preventDefault();
            const pasted = e.clipboardData.getData('text').replace(/\D/g, '').slice(0, 6);
            pasted.split('').forEach((char, idx) => {
                if (boxes[idx]) {
                    boxes[idx].value = char;
                    boxes[idx].classList.add('filled');
                }
            });
            syncHidden();
            if (pasted.length < 6) boxes[pasted.length].focus();
            else boxes[5].focus();
        });
    });

    function syncHidden() {
        const val = Array.from(boxes).map(b => b.value).join('');
        hidden.value = val;
        verifyBtn.disabled = val.length < 6;
    }

    // Focus first box on load
    boxes[0].focus();

    // ── Countdown Timer ──
    let seconds = 120;
    const timerEl  = document.getElementById('timer');
    const resendBtn = document.getElementById('resendBtn');

    const countdown = setInterval(() => {
        seconds--;
        const m = String(Math.floor(seconds / 60)).padStart(2, '0');
        const s = String(seconds % 60).padStart(2, '0');
        timerEl.textContent = `${m}:${s}`;

        if (seconds <= 0) {
            clearInterval(countdown);
            timerEl.style.display = 'none';
            resendBtn.style.display = 'inline';
        }
    }, 1000);

    function resendOtp() {
        // Hook this to your backend resend endpoint
        resendBtn.textContent = 'OTP Sent!';
        resendBtn.disabled = true;
        setTimeout(() => { resendBtn.textContent = 'Resend OTP'; resendBtn.disabled = false; }, 30000);
    }

    // ── Auto dismiss Thymeleaf alerts ──
    setTimeout(() => {
        document.querySelectorAll('.alert-stack .alert').forEach(el => {
            el.style.transition = 'opacity 0.5s';
            el.style.opacity = '0';
            setTimeout(() => el.remove(), 500);
        });
    }, 2500);
</script>



</body>
</html>
