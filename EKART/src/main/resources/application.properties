# ===============================
# APPLICATION CONFIG
# ===============================

# FEATURE #22 - THYMELEAF DEPRECATION NOTICE
# ─────────────────────────────────────────────────────────────────────────────
# Legacy Thymeleaf routes (/admin/accounts, /customer/profile, etc.) are 
# deprecated in favor of React SPA (/admin/*, /shop/*, /vendor/*, /delivery/*).
# 
# DEPRECATION ROADMAP:
#  Phase 1 (NOW):         Legacy routes log warnings, show X-Deprecated header
#  Phase 2 (Q2 2025):     Legacy routes redirect to React SPA (HTTP 301)
#  Phase 3 (Q3 2025):     Legacy routes return 401 with migration guide link
#                         All Thymeleaf controllers removed
# 
# See: com.example.ekart.middleware.DeprecationInterceptor for route mappings
# ─────────────────────────────────────────────────────────────────────────────

spring.application.name=ekart
server.address = 0.0.0.0
server.port=8080


# ===============================
# POSTGRESQL DATABASE CONFIG
# ===============================
# Uses environment variables: DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD
# Defaults to localhost:5432 for local development
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ekart}?sslmode=disable
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQL12Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQL12Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.jakarta.persistence.validation.mode=none

# ===============================
# FLYWAY DATABASE MIGRATION
# ===============================
# Automatically applies SQL migrations from src/main/resources/db/migration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.out-of-order=true
spring.flyway.repair-on-migrate=true
spring.flyway.validate-on-migrate=false

# ===============================
# PERFORMANCE — JDBC BATCHING + CACHE
# ===============================
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.batch_versioned_data=true
spring.cache.type=simple


# ===============================
# CONNECTION POOL (HikariCP) - faster DB connections
# ===============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.auto-commit=true

# ===============================
# THYMELEAF CACHE (faster page rendering)
# ===============================
# Templates are parsed once and cached — no re-reading HTML files on every request
spring.thymeleaf.cache=true

# open-in-view intentionally left as default (true) — FlutterApiController and
# ProfileWishlistApiController access lazy collections outside @Transactional.
# Changing to false would cause LazyInitializationException on those endpoints.

# ===============================
# STATIC RESOURCE CACHING (CSS/JS cached in browser)
# ===============================
spring.web.resources.cache.period=86400
spring.web.resources.cache.cachecontrol.max-age=86400

# ===============================
# LOGGING — Reduce verbosity
# ===============================
logging.level.root=info
logging.level.org.hibernate=warn
logging.level.org.hibernate.SQL=debug
logging.level.org.springframework.boot=info
logging.level.org.springframework.web=warn
logging.level.org.springframework.mail=debug
logging.level.com.sun.mail=debug
logging.level.com.example.ekart=debug


# ===============================
# EMAIL CONFIG (Gmail SMTP)
# CRITICAL: Set MAIL_USERNAME and MAIL_PASSWORD environment variables
# DO NOT use default values in production - they are placeholders only
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:no-reply@ekart.local}
spring.mail.password=${MAIL_PASSWORD:SET_VIA_ENVIRONMENT_VARIABLE}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.properties.mail.debug=true
spring.mail.from=${MAIL_USERNAME:no-reply@ekart.local}

# ===============================
# FILE UPLOAD CONFIG
# ===============================
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=150MB


# ===============================
# CLOUDINARY CONFIG (USE ENVIRONMENT VARIABLES)
# ===============================
cloudinary.cloud=${CLOUDINARY_CLOUD:demo}
cloudinary.key=${CLOUDINARY_KEY:demo}
cloudinary.secret=${CLOUDINARY_SECRET:demo}


# ===============================
# ADMIN AUTHENTICATION (Database-backed, NO hardcoded credentials)
# ===============================
# Admin credentials are now stored securely in database (admin_credential table)
# with BCrypt password hashing and optional 2FA (TOTP) support.
# 
# Credentials are NO LONGER stored in properties or .env files.
# Use AdminAuthService for authentication instead of hardcoded values.
#
# See: src/main/java/com/example/ekart/service/AdminAuthService.java
# See: db/migration/V002__Create_AdminCredential_Table.sql
admin.email=${ADMIN_EMAIL:admin@gmail.com}
admin.password=${ADMIN_PASSWORD:Admin@123}

server.error.include-message=never
server.error.include-stacktrace=never


# ===============================
# ===============================
# OAUTH2 SOCIAL LOGIN CONFIG
# FEATURE #5: OAuth2 Social Login (Google, GitHub working; Facebook/Instagram limited)
# ===============================

# GOOGLE OAuth2 — WORKING (Standard Spring OAuth2)
# ✅ Status: Production-ready
# Requires: GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET from Google Cloud Console
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}
spring.security.oauth2.client.registration.google.scope=email,profile

# GITHUB OAuth2 — WORKING (Admin only, pre-configured in Spring Security)
# ✅ Status: Production-ready
# Requires: GITHUB_CLIENT_ID, GITHUB_CLIENT_SECRET from GitHub OAuth App settings
# Note: GitHub login restricted to Admin role by OAuthProviderValidator
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:your-github-client-id}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:your-github-client-secret}
spring.security.oauth2.client.registration.github.scope=user:email,read:user

# FACEBOOK OAuth2 — LIMITED (Requires App Review for public use)
# ⚠️  Status: Partial — Works in development, blocked in production until App Review approved
# Requires: FACEBOOK_CLIENT_ID, FACEBOOK_CLIENT_SECRET from Facebook Developers
# BEFORE PUBLIC DEPLOYMENT:
#   1. Submit app to Facebook App Review with required permissions (email, public_profile)
#   2. Wait for Facebook team approval (typically 1-7 days)
#   3. Move app from Development to Live status
#   4. Update FACEBOOK_CLIENT_ID/FACEBOOK_CLIENT_SECRET to live credentials
# See: OAUTH2-DEPLOYMENT-CHECKLIST.md
spring.security.oauth2.client.registration.facebook.client-id=${FACEBOOK_CLIENT_ID:your-facebook-client-id}
spring.security.oauth2.client.registration.facebook.client-secret=${FACEBOOK_CLIENT_SECRET:your-facebook-client-secret}
spring.security.oauth2.client.registration.facebook.scope=email,public_profile

# INSTAGRAM OAuth2 — DISABLED (Non-standard API, requires Graph API setup)
# ❌ Status: Disabled — Instagram uses Meta Graph API (not standard OAuth2)
# Issue: current Spring OAuth2 config incompatible with Instagram Graph API
# Future: Implement custom OAuth2Provider for Instagram Graph API if needed
# Disabled: See OAuthProviderValidator and remove "instagram" from allowed providers
# spring.security.oauth2.client.registration.instagram.client-id=${INSTAGRAM_CLIENT_ID:your-instagram-client-id}
# spring.security.oauth2.client.registration.instagram.client-secret=${INSTAGRAM_CLIENT_SECRET:your-instagram-client-secret}
# spring.security.oauth2.client.registration.instagram.authorization-grant-type=authorization_code
# spring.security.oauth2.client.registration.instagram.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
# spring.security.oauth2.client.registration.instagram.scope=user_profile,user_media
# spring.security.oauth2.client.provider.instagram.authorization-uri=https://api.instagram.com/oauth/authorize
# spring.security.oauth2.client.provider.instagram.token-uri=https://api.instagram.com/oauth/access_token
# spring.security.oauth2.client.provider.instagram.user-info-uri=https://graph.instagram.com/me?fields=id,username
# spring.security.oauth2.client.provider.instagram.user-name-attribute=username

# ─── ENCRYPTION CONFIG (Feature #2 Security Fix)
# AES_SECRET MUST be ≥32 characters (256-bit) for production
# CRITICAL: This is a placeholder. Set actual secret via environment variable
# Example 32-char secret: aB!Cd$Ef%Gh&Ij(Kl)Mn*Op+Qr=St@Uv
aes.secret=${AES_SECRET:aB!Cd$Ef%Gh&Ij(Kl)Mn*Op+Qr=St@Uv}
aes.salt=${AES_SALT:AbCdEfGhIjKlMnOpQrStUvWxYz}

gemini.api.key=${GEMINI_API_KEY:}

# ===============================
# REPORTING DATABASE CONFIG (CONSOLIDATED INTO MAIN DB - April 6, 2026)
# ===============================
# Previously: SalesRecord stored in separate H2 database (ekart_reporting_db)
# Now: SalesRecord consolidated into main PostgreSQL database
# 
# Benefits:
#  - Unified queryability with Order, Product, Vendor, Customer entities
#  - Single database to manage and backup
#  - Better data consistency
#  - Proper JPA relationships instead of primitive foreign keys
#
# The following properties are DEPRECATED and no longer used:
# (keeping them here for reference if you need to revert)
# 
# reporting.datasource.url=jdbc:h2:file:./ekart_reporting_db;DB_CLOSE_ON_EXIT=FALSE;DB_CLOSE_DELAY=-1
# reporting.datasource.username=sa
# reporting.datasource.password=
# reporting.datasource.driver-class-name=org.h2.Driver

spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF
logging.level.org.hibernate.type.descriptor.sql=OFF
# ===============================
# BANNER DEFAULT TEXT
# ===============================
ekart.banner.title=Welcome to Ekart
ekart.banner.subtitle=Your one-stop shopping destination

# JWT
jwt.secret=${JWT_SECRET:ekart-super-secret-jwt-key-2024-minimum-256bits!!}

# ===============================
# DEPRECATED: LEGACY CART API (/api/cart/*)
# ===============================
# ⚠️  DEPRECATED — Use /api/react/cart/* instead (ReactApiController)
#
# The legacy CartOrderApiController (/api/cart/*) has been DEPRECATED.
# All new development should use /api/react/cart/* endpoints.
#
# Issue: Duplicate cart controllers create confusion and risk of double-handling.
# Fix: This property explicitly disables the legacy controller.
#
# Endpoints to migrate:
#   /api/cart/* → /api/react/cart/*
#   /api/orders/* → /api/react/orders/*
#
# Legacy controller details:
#   - File: com.example.ekart.controller.CartOrderApiController
#   - Status: @Deprecated(since = "0.0.1", forRemoval = true)
#   - Scheduled: will be removed in next major release
#
# For Flutter app migration: Use /api/flutter/* endpoints instead (FlutterApiController).
ekart.api.legacy-cart.enabled=false

# ===============================
# RAZORPAY PAYMENT GATEWAY CONFIG
# ===============================
# Set RAZORPAY_KEY_ID and RAZORPAY_KEY_SECRET as environment variables.
# Get these from: https://dashboard.razorpay.com → Settings → API Keys
#
# Example (Test Mode):
#   RAZORPAY_KEY_ID=rzp_test_abc123...
#   RAZORPAY_KEY_SECRET=def456ghi...
#
# Example (Live Mode):
#   RAZORPAY_KEY_ID=rzp_live_xyz789...
#   RAZORPAY_KEY_SECRET=uvw012jkl...
#
# CRITICAL: Never commit secret keys. Use environment variables only.
# The RazorpayService will throw IllegalStateException if keys are missing.
razorpay.key.id=${RAZORPAY_KEY_ID:}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:}
