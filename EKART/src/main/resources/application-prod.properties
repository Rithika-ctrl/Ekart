# ===============================
# EKART PRODUCTION CONFIGURATION
# ===============================
# To activate: java -jar app.jar --spring.profiles.active=prod
# Or set: SPRING_PROFILES_ACTIVE=prod
# ===============================

# ===============================
# SERVER CONFIGURATION
# ===============================
server.address=0.0.0.0
server.port=8080
server.servlet.context-path=/
server.compression.enabled=true
server.compression.min-response-size=1024

# ===============================
# POSTGRESQL DATABASE CONFIG (PRODUCTION)
# ===============================
# REQUIRED ENVIRONMENT VARIABLES (set in .env or cloud secrets manager):
#   DB_HOST      - RDS/Cloud database hostname
#   DB_PORT      - Database port (usually 5432)
#   DB_NAME      - Database name
#   DB_USER      - Non-root database user
#   DB_PASSWORD  - Strong random password (30+ chars)
#
# Example: jdbc:postgresql://ekart-prod-db.xxxxx.rds.amazonaws.com:5432/ekart_prod
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ekart}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA/HIBERNATE - PRODUCTION MODE
# ===============================
# 🔐 SECURITY: validate only - schema changes via Flyway migrations only
# NEVER use 'create', 'create-drop', or 'update' in production
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.jakarta.persistence.validation.mode=none
spring.jpa.open-in-view=false

# ===============================
# FLYWAY DATABASE MIGRATIONS
# ===============================
# Flyway automatically runs pending migrations on startup
# Migration files: src/main/resources/db/migration/V*.sql
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.validate-on-migrate=true
spring.flyway.schemas=public,reporting

# Reporting data is persisted in separate PostgreSQL schema
reporting.schema=reporting

# ===============================
# PERFORMANCE — JDBC BATCHING + CACHE
# ===============================
spring.jpa.properties.hibernate.jdbc.batch_size=30
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.batch_versioned_data=true
spring.cache.type=simple

# ===============================
# CONNECTION POOL (HikariCP) - PRODUCTION
# ===============================
# Tuned for higher concurrency in production
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.connection-init-sql=CREATE SCHEMA IF NOT EXISTS reporting

# ===============================
# THYMELEAF CACHING (PRODUCTION)
# ===============================
spring.thymeleaf.cache=true
spring.thymeleaf.mode=HTML

# ===============================
# STATIC RESOURCE CACHING
# ===============================
spring.web.resources.cache.period=31536000
spring.web.resources.cache.cachecontrol.max-age=31536000
spring.web.resources.chain.cache=true
spring.web.resources.chain.compressed=true

# ===============================
# LOGGING - PRODUCTION LEVEL
# ===============================
logging.level.root=warn
logging.level.org.hibernate=warn
logging.level.org.hibernate.SQL=info
logging.level.org.springframework.boot=warn
logging.level.org.springframework.web=warn
logging.level.org.springframework.mail=warn
logging.level.com.example.ekart=info
logging.level.com.example.ekart.service.AdminAuthService=debug

# Log to file
logging.file.name=/var/log/ekart/application.log
logging.file.max-size=100MB
logging.file.max-history=30
logging.file.total-size-cap=5GB
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ===============================
# EMAIL CONFIG (PRODUCTION - Gmail SMTP)
# ===============================
# REQUIRED ENVIRONMENT VARIABLES:
#   MAIL_USERNAME - Gmail address (separate service account recommended)
#   MAIL_PASSWORD - Gmail app password (16 chars, NOT main password)
#
# Generate app password at: https://myaccount.google.com/apppasswords
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:no-reply@ekart.com}
spring.mail.password=${MAIL_PASSWORD:change-me-in-production}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.from=${MAIL_USERNAME:no-reply@ekart.com}

# ===============================
# FILE UPLOAD CONFIG
# ===============================
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=150MB

# ===============================
# CLOUDINARY CONFIG (PRODUCTION)
# ===============================
# REQUIRED ENVIRONMENT VARIABLES:
#   CLOUDINARY_CLOUD  - Cloud name
#   CLOUDINARY_KEY    - API key (rotate every 6 months)
#   CLOUDINARY_SECRET - API secret (rotate every 6 months)
#
# Regenerate at: https://cloudinary.com/console/settings/api-keys
cloudinary.cloud=${CLOUDINARY_CLOUD:your-cloud}
cloudinary.key=${CLOUDINARY_KEY:your-key}
cloudinary.secret=${CLOUDINARY_SECRET:your-secret}

# ===============================
# AES ENCRYPTION CONFIG (PRODUCTION)
# ===============================
# REQUIRED ENVIRONMENT VARIABLES:
#   AES_SECRET - 32-character encryption key (generated with openssl rand -base64 32)
#   AES_SALT   - 16-character salt value (generated with openssl rand -base64 16)
#
# For security: Store in AWS Secrets Manager or HashiCorp Vault
aes.secret=${AES_SECRET:change-me-in-production}
aes.salt=${AES_SALT:change-me-salt}

# ===============================
# ADMIN SECURITY CONFIG
# ===============================
# Admin credentials are NOW DATABASE-BACKED via admin_credential table
# Login endpoint: POST /api/react/auth/admin/login
# 
# Initial admin setup (one-time during deployment):
# 1. SSH to production database
# 2. Insert admin with BCrypt-hashed password (see SECURITY-CONFIGURATION.md)
# 3. Enable 2FA via admin dashboard
#
# Brute force protection:
#   - Max 5 failed login attempts
#   - 15-minute account lockout (auto-unlock)
#   - All attempts logged for audit trail

# ===============================
# ACTUATOR - METRICS & MONITORING
# ===============================
# Expose health and metrics endpoints
management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true

# ===============================
# JWT SECURITY (PRODUCTION)
# ===============================
# REQUIRED ENVIRONMENT VARIABLE: JWT_SECRET
# Must be a strong, random 256+ bit value.
# Generate with: openssl rand -base64 32
# Store in: AWS Secrets Manager, HashiCorp Vault, or secure env var
#
# WARNING: Application will fail to start if JWT_SECRET is not set in production mode.
# This is a security feature — your tokens must be signed with YOUR secret, not a known default.
jwt.secret=${JWT_SECRET:will-cause-startup-failure-in-production-without-env-var}

# ===============================
# SECURITY HEADERS
# ===============================
# These should also be set at the reverse proxy/WAF level
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-exception=false

# ===============================
# APPLICATION METADATA
# ===============================
spring.application.name=ekart
spring.application.version=1.0.0
spring.application.description=EKART E-commerce Platform Backend (Production)
